<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminkalender – ImmoNova</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body style="margin:0;padding:0;">
<script>
if(!checkAuth()) { window.location.href='login.html'; }
var user = getUser();

var _calMonth = new Date().getMonth();
var _calYear  = new Date().getFullYear();
var _editId   = null;

var KAT_COLORS = {
  wartung:     { bg:'#dbeafe', text:'#2563eb', dot:'#2563eb', label:'Wartung',      icon:'🔧' },
  uebergabe:   { bg:'#dcfce7', text:'#16a34a', dot:'#16a34a', label:'Übergabe',     icon:'🔑' },
  zahlung:     { bg:'#fef9c3', text:'#d97706', dot:'#d97706', label:'Zahlung',       icon:'💳' },
  besichtigung:{ bg:'#ede9fe', text:'#7c3aed', dot:'#7c3aed', label:'Besichtigung', icon:'👁️' },
  sonstiges:   { bg:'#f1f5f9', text:'#64748b', dot:'#64748b', label:'Sonstiges',    icon:'📌' }
};

var MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var DAYS   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

function pad2(n){ return n<10?'0'+n:''+n; }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(){
  var actionBtn = '<button onclick="openAddModal()" style="background:#2563eb;color:white;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">+ Termin anlegen</button>';

  var mainHTML =
    '<div style="display:flex;gap:20px;align-items:flex-start;">'
    // Left: calendar
    +'<div style="flex:1;min-width:0;">'
    +  '<div style="background:white;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07);">'
    +    '<div id="cal-nav" style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0;"></div>'
    +    '<div style="display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid #e2e8f0;">'
    +    DAYS.map(function(d){
           return '<div style="text-align:center;font-size:11px;font-weight:700;color:#64748b;padding:10px 0;letter-spacing:0.5px;">'+d+'</div>';
         }).join('')
    +    '</div>'
    +    '<div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);"></div>'
    +  '</div>'
    +'</div>'
    // Right: upcoming
    +'<div style="width:308px;flex-shrink:0;">'
    +  '<div style="background:white;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07);">'
    +    '<div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px;">'
    +      '<span style="font-size:16px;">🗓️</span>'
    +      '<span style="font-size:14px;font-weight:700;color:#0f172a;">Nächste Termine</span>'
    +    '</div>'
    +    '<div id="upcoming-list" style="max-height:calc(100vh - 160px);overflow-y:auto;"></div>'
    +  '</div>'
    +'</div>'
    +'</div>';

  // Modal form
  var katOpts = Object.keys(KAT_COLORS).map(function(k){
    return '<option value="'+k+'">'+KAT_COLORS[k].icon+' '+KAT_COLORS[k].label+'</option>';
  }).join('');

  var modalContent =
    formGroup('Titel *','<input id="k-ttl" type="text" placeholder="z.B. Heizungswartung..." '+inputStyle+'>')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +formGroup('Datum *','<input id="k-dat" type="date" '+inputStyle+'>')
    +formGroup('Uhrzeit (optional)','<input id="k-zt" type="time" '+inputStyle+'>')
    +'</div>'
    +formGroup('Kategorie','<select id="k-kat" '+inputStyle+'>'+katOpts+'</select>')
    +formGroup('Notiz','<textarea id="k-not" rows="3" placeholder="Optionale Notizen..." style="width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;background:white;outline:none;box-sizing:border-box;resize:vertical;" onfocus="this.style.borderColor=\'#2563eb\'" onblur="this.style.borderColor=\'#e2e8f0\'"></textarea>')
    +'<div id="k-del-wrap" style="display:none;margin-bottom:12px;">'
    +'<button onclick="deleteTermin()" style="width:100%;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:9px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">🗑️ Termin löschen</button>'
    +'</div>'
    +'<div style="display:flex;gap:10px;">'
    +'<button onclick="saveTermin()" style="flex:1;background:#2563eb;color:white;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'<button onclick="hideModal(\'k-modal\')" style="flex:1;background:#f1f5f9;color:#64748b;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'</div>';

  renderLayout('kalender','Terminkalender',actionBtn,mainHTML,modalHTML('k-modal','📅 Termin',modalContent));
  renderCalendar();
  renderUpcoming();
}

function renderCalendar(){
  var navEl  = document.getElementById('cal-nav');
  var gridEl = document.getElementById('cal-grid');
  if(!navEl||!gridEl) return;

  navEl.innerHTML =
    '<button onclick="_calPrev()" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#0f172a;">← Zurück</button>'
    +'<span style="font-size:16px;font-weight:700;color:#0f172a;">'+MONTHS[_calMonth]+' '+_calYear+'</span>'
    +'<div style="display:flex;gap:8px;">'
    +'<button onclick="_calToday()" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#16a34a;">Heute</button>'
    +'<button onclick="_calNext()" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#0f172a;">Weiter →</button>'
    +'</div>';

  var termine  = getData(KEYS.termine, []);
  var todayStr = today();

  // Build cells
  var firstWeekday = new Date(_calYear, _calMonth, 1).getDay(); // 0=Sun
  var offset = firstWeekday === 0 ? 6 : firstWeekday - 1; // convert to Mon-based
  var daysInMonth    = new Date(_calYear, _calMonth+1, 0).getDate();
  var daysInPrevMon  = new Date(_calYear, _calMonth, 0).getDate();

  var cells = [];
  for(var i=offset-1;i>=0;i--)  cells.push({d:daysInPrevMon-i, cur:false});
  for(var d=1;d<=daysInMonth;d++) cells.push({d:d, cur:true});
  while(cells.length<42)         cells.push({d:cells.length-offset-daysInMonth+1, cur:false});

  var html = '';
  cells.forEach(function(cell,idx){
    var dateStr='', dayTerms=[];
    if(cell.cur){
      dateStr = _calYear+'-'+pad2(_calMonth+1)+'-'+pad2(cell.d);
      dayTerms = termine.filter(function(t){return t.dat===dateStr;});
    }
    var isToday   = cell.cur && dateStr===todayStr;
    var isPast    = cell.cur && dateStr<todayStr;
    var isWeekend = idx%7>=5;
    var bRight    = idx%7<6  ? '1px solid #f1f5f9':'none';
    var bBottom   = idx<35   ? '1px solid #f1f5f9':'none';
    var bgCell    = isWeekend&&cell.cur?'#fefefe' : (!cell.cur?'#fafafa':'white');

    html += '<div'+(cell.cur?' onclick="cellClick(\''+dateStr+'\')"':'')
      +' style="min-height:100px;padding:7px;border-right:'+bRight+';border-bottom:'+bBottom+';background:'+bgCell+';'+(cell.cur?'cursor:pointer;':'')+'"'
      +(cell.cur?' onmouseover="this.style.background=\'#f0f9ff\'" onmouseout="this.style.background=\''+bgCell+'\'"':'')+' >';

    // Day number badge
    html += '<div style="display:flex;justify-content:flex-end;margin-bottom:3px;">';
    if(isToday){
      html += '<span style="background:#2563eb;color:white;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">'+cell.d+'</span>';
    } else {
      html += '<span style="font-size:12px;font-weight:'+(cell.cur?'600':'400')+';color:'+(cell.cur?(isPast?'#94a3b8':'#0f172a'):'#cbd5e1')+';padding:2px 4px;">'+cell.d+'</span>';
    }
    html += '</div>';

    // Event pills
    if(cell.cur){
      var visible = dayTerms.slice(0,3);
      var extra   = dayTerms.length-3;
      visible.forEach(function(t){
        var kc = KAT_COLORS[t.kat]||KAT_COLORS.sonstiges;
        html += '<div onclick="event.stopPropagation();openEditModal(\''+t.id+'\')"'
          +' title="'+esc(t.ttl)+'"'
          +' style="background:'+kc.bg+';color:'+kc.text+';font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;border-left:2px solid '+kc.dot+';">'
          +(t.zt?t.zt+' ':'')+esc(t.ttl)
          +'</div>';
      });
      if(extra>0){
        html += '<div style="font-size:10px;color:#64748b;font-weight:600;padding:1px 4px;">+'+extra+' weitere</div>';
      }
    }
    html += '</div>';
  });

  gridEl.innerHTML = html;
}

function renderUpcoming(){
  var listEl = document.getElementById('upcoming-list');
  if(!listEl) return;
  var alle    = getData(KEYS.termine,[]);
  var todStr  = today();
  var coming  = alle
    .filter(function(t){return t.dat>=todStr;})
    .sort(function(a,b){return (a.dat+(a.zt||'')) < (b.dat+(b.zt||'')) ? -1:1;})
    .slice(0,10);

  if(!coming.length){
    listEl.innerHTML = '<div style="padding:28px;text-align:center;color:#94a3b8;font-size:13px;">Keine bevorstehenden Termine</div>';
    return;
  }
  listEl.innerHTML = coming.map(function(t){
    var kc = KAT_COLORS[t.kat]||KAT_COLORS.sonstiges;
    return '<div style="padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:10px;cursor:pointer;" onclick="openEditModal(\''+t.id+'\')" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'white\'">'
      +'<div style="width:36px;height:36px;background:'+kc.bg+';border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">'+kc.icon+'</div>'
      +'<div style="flex:1;min-width:0;">'
      +  '<div style="font-size:13px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;">'+esc(t.ttl)+'</div>'
      +  '<div style="font-size:11px;color:#64748b;margin-bottom:4px;">'+fmtDate(t.dat)+(t.zt?' · '+t.zt:'')+'</div>'
      +  '<span style="display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:'+kc.bg+';color:'+kc.text+';">'+kc.label+'</span>'
      +'</div>'
      +'<button onclick="event.stopPropagation();_delTermin(\''+t.id+'\')" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:15px;padding:4px;border-radius:6px;" onmouseover="this.style.color=\'#dc2626\'" onmouseout="this.style.color=\'#94a3b8\'">🗑️</button>'
      +'</div>';
  }).join('');
}

function cellClick(dateStr){
  _editId = null;
  document.getElementById('k-ttl').value='';
  document.getElementById('k-dat').value=dateStr;
  document.getElementById('k-zt').value='';
  document.getElementById('k-kat').value='sonstiges';
  document.getElementById('k-not').value='';
  document.getElementById('k-del-wrap').style.display='none';
  // Update modal title
  var hdr = document.querySelector('#k-modal [style*="font-size:16px"]');
  if(hdr) hdr.textContent='📅 Neuer Termin';
  showModal('k-modal');
}

function openAddModal(){
  _editId = null;
  document.getElementById('k-ttl').value='';
  document.getElementById('k-dat').value=today();
  document.getElementById('k-zt').value='';
  document.getElementById('k-kat').value='sonstiges';
  document.getElementById('k-not').value='';
  document.getElementById('k-del-wrap').style.display='none';
  var hdr = document.querySelector('#k-modal [style*="font-size:16px"]');
  if(hdr) hdr.textContent='📅 Termin anlegen';
  showModal('k-modal');
}

function openEditModal(id){
  var termine = getData(KEYS.termine,[]);
  var t = termine.find(function(x){return x.id===id;});
  if(!t) return;
  _editId = id;
  document.getElementById('k-ttl').value = t.ttl||'';
  document.getElementById('k-dat').value = t.dat||'';
  document.getElementById('k-zt').value  = t.zt||'';
  document.getElementById('k-kat').value = t.kat||'sonstiges';
  document.getElementById('k-not').value = t.not||'';
  document.getElementById('k-del-wrap').style.display='block';
  var hdr = document.querySelector('#k-modal [style*="font-size:16px"]');
  if(hdr) hdr.textContent='📅 Termin bearbeiten';
  showModal('k-modal');
}

function saveTermin(){
  var ttl = (document.getElementById('k-ttl').value||'').trim();
  var dat = document.getElementById('k-dat').value;
  var zt  = document.getElementById('k-zt').value;
  var kat = document.getElementById('k-kat').value;
  var not = (document.getElementById('k-not').value||'').trim();
  if(!ttl){ alert('Bitte einen Titel eingeben.'); return; }
  if(!dat){ alert('Bitte ein Datum wählen.'); return; }

  var termine = getData(KEYS.termine,[]);
  if(_editId){
    termine = termine.map(function(t){ if(t.id===_editId){t.ttl=ttl;t.dat=dat;t.zt=zt;t.kat=kat;t.not=not;} return t; });
    addNotif('📅','Termin geändert: '+ttl);
  } else {
    termine.push({id:'ter_'+Date.now(),ttl:ttl,dat:dat,zt:zt,kat:kat,not:not});
    addNotif('📅','Termin: '+ttl);
  }
  setData(KEYS.termine,termine);
  syncToFirebase(user.uid);
  hideModal('k-modal');
  var d = new Date(dat);
  _calMonth = d.getMonth();
  _calYear  = d.getFullYear();
  renderCalendar();
  renderUpcoming();
  _editId = null;
}

function deleteTermin(){
  if(!_editId||!confirm('Termin wirklich löschen?')) return;
  _delTermin(_editId);
  hideModal('k-modal');
}

function _delTermin(id){
  if(!confirm('Termin wirklich löschen?')) return;
  var termine = getData(KEYS.termine,[]).filter(function(t){return t.id!==id;});
  setData(KEYS.termine,termine);
  syncToFirebase(user.uid);
  renderCalendar();
  renderUpcoming();
}

function _calPrev(){ _calMonth--; if(_calMonth<0){_calMonth=11;_calYear--;} renderCalendar(); }
function _calNext(){ _calMonth++; if(_calMonth>11){_calMonth=0;_calYear++;} renderCalendar(); }
function _calToday(){ var n=new Date(); _calMonth=n.getMonth(); _calYear=n.getFullYear(); renderCalendar(); }

initFirebase();
loadFromFirebase(user.uid, render);
</script>
</body>
</html>
