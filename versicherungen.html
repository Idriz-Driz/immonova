<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – Versicherungen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body>
<script>
checkAuth(); checkTrial();
var user = getUser(); var uid = user.uid;
var editId = null;
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;background:white;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor=\'#2563eb\'" onblur="this.style.borderColor=\'#e2e8f0\'';

var VS_TYPEN = {
  'Gebäudeversicherung':  { ico: '🏢', col: '#2563eb' },
  'Haftpflichtversicherung':{ ico: '⚖️', col: '#7c3aed' },
  'Hausratversicherung':  { ico: '🛋️', col: '#ea580c' },
  'Feuerversicherung':    { ico: '🔥', col: '#dc2626' },
  'Elementarversicherung':{ ico: '🌊', col: '#0891b2' },
  'Rechtsschutzversicherung':{ ico: '📋', col: '#64748b' },
  'Glasversicherung':     { ico: '🪟', col: '#16a34a' },
  'Technische Versicherung':{ ico: '⚙️', col: '#d97706' },
  'Sonstige':             { ico: '📄', col: '#94a3b8' }
};

function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl(t) { return '<label style="display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;">'+t+'</label>'; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date()) / (1000*60*60*24));
}

function render() {
  var list = getData(KEYS.versicherungen, []);
  var qQ = ((document.getElementById('f-q')||{}).value||'').toLowerCase();
  var filtered = list.filter(function(v){
    if (qQ && !(v.typ+v.gesellschaft+v.nummer+v.objekt+'').toLowerCase().includes(qQ)) return false;
    return true;
  });

  var heute = today();
  var in30 = new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  var ablaufend = list.filter(function(v){ return v.ablauf && v.ablauf >= heute && v.ablauf <= in30; });
  var abgelaufen = list.filter(function(v){ return v.ablauf && v.ablauf < heute; });
  var jahresPraemie = list.reduce(function(s,v){ return s+parseFloat(v.praemie||0); }, 0);

  // Warn banner
  var warnBanner = '';
  if (abgelaufen.length) {
    warnBanner = '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">'
      +'<span style="font-size:20px;">🚨</span>'
      +'<div><div style="font-size:14px;font-weight:700;color:#dc2626;">'+abgelaufen.length+' Versicherung(en) abgelaufen!</div>'
      +'<div style="font-size:12px;color:#ef4444;">Bitte Laufzeit überprüfen und ggf. erneuern.</div></div>'
      +'</div>';
  } else if (ablaufend.length) {
    warnBanner = '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">'
      +'<span style="font-size:20px;">⚠️</span>'
      +'<div><div style="font-size:14px;font-weight:700;color:#d97706;">'+ablaufend.length+' Versicherung(en) läuft in 30 Tagen ab</div>'
      +'<div style="font-size:12px;color:#92400e;">Rechtzeitig zur Verlängerung melden.</div></div>'
      +'</div>';
  }

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;">'
    +kpi('🛡️','Versicherungen',list.length,'')
    +kpi('🚨','Abgelaufen',abgelaufen.length,'')
    +kpi('⚠️','Bald ablaufend',ablaufend.length,'')
    +kpi('💰','Jahresprämien',fmt(Math.round(jahresPraemie)),'€/Jahr')
    +'</div>';

  var filterHtml = '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">'
    +'<input id="f-q" oninput="render()" value="'+esc(qQ)+'" placeholder="🔍 Typ, Gesellschaft, Nummer..." style="'+inputStyle+'max-width:280px;">'
    +'</div>';

  var cardsHtml = '';
  if (!filtered.length) {
    cardsHtml = emptyState('🛡️','Keine Versicherungen','Erfasse deine erste Versicherung','+ Versicherung hinzufügen','openAdd()');
  } else {
    cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">';
    filtered.forEach(function(v) {
      var typ = VS_TYPEN[v.typ] || VS_TYPEN.Sonstige;
      var days = daysUntil(v.ablauf);
      var expired = v.ablauf && v.ablauf < heute;
      var urgent = !expired && days !== null && days <= 30;
      var borderCol = expired ? '#dc2626' : urgent ? '#d97706' : '#e2e8f0';
      var borderWidth = (expired || urgent) ? '2px' : '1px';

      cardsHtml += '<div style="background:white;border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:'+borderWidth+' solid '+borderCol+';">'
        +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">'
        +'<div style="width:46px;height:46px;border-radius:12px;background:'+typ.col+'20;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">'+typ.ico+'</div>'
        +'<div style="flex:1;">'
        +'<div style="font-size:14px;font-weight:700;color:#0f172a;">'+esc(v.typ||'Sonstige')+'</div>'
        +'<div style="font-size:12px;color:#64748b;">'+esc(v.gesellschaft||'–')+'</div>'
        +'</div>'
        +(expired?'<span style="background:#fef2f2;color:#dc2626;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">Abgelaufen</span>':urgent?'<span style="background:#fffbeb;color:#d97706;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">'+days+' Tage</span>':'<span style="background:#f0fdf4;color:#16a34a;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">Aktiv</span>')
        +'</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">'
        +vsField('📋 Nummer', v.nummer||'–')
        +vsField('🏠 Objekt', v.objekt||'–')
        +vsField('📅 Beginn', fmtDate(v.beginn))
        +vsField('🗓 Ablauf', fmtDate(v.ablauf)||'–')
        +vsField('💰 Prämie', v.praemie?(fmt(v.praemie)+' €/'+( v.zahlweise||'Jahr')):'–')
        +vsField('🔄 Zahlweise', v.zahlweise||'–')
        +'</div>'
        +(v.notiz?'<div style="font-size:12px;color:#64748b;background:#f8fafc;border-radius:8px;padding:8px;margin-bottom:10px;">'+esc(v.notiz)+'</div>':'')
        +'<div style="display:flex;gap:6px;">'
        +'<button onclick="openEdit(\''+v.id+'\')" style="flex:1;padding:7px;border-radius:8px;border:none;background:#eff6ff;color:#2563eb;font-size:12px;font-weight:700;cursor:pointer;">✏️ Bearbeiten</button>'
        +'<button onclick="deleteVs(\''+v.id+'\')" style="width:32px;height:32px;border-radius:8px;border:none;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:13px;">🗑️</button>'
        +'</div>'
        +'</div>';
    });
    cardsHtml += '</div>';
    // Footer Summe
    cardsHtml += '<div style="background:white;border-radius:14px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-top:16px;display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-size:13px;color:#64748b;font-weight:600;">Gesamte Jahreskosten ('+list.length+' Versicherungen)</span>'
      +'<span style="font-size:20px;font-weight:800;color:#0f172a;">'+fmt(Math.round(jahresPraemie))+' €</span>'
      +'</div>';
  }

  var actionBtn = '<button onclick="openAdd()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Versicherung hinzufügen</button>';
  var main = '<div style="padding:24px;">'+getTrialBanner()+warnBanner+kpiHtml+filterHtml+cardsHtml+'</div>';
  renderLayout('versicherungen','Versicherungen', actionBtn, main, buildModal());
}

function vsField(label, val) {
  return '<div style="background:#f8fafc;border-radius:8px;padding:8px;">'
    +'<div style="font-size:10px;color:#94a3b8;">'+label+'</div>'
    +'<div style="font-size:12px;font-weight:600;color:#0f172a;">'+esc(val)+'</div>'
    +'</div>';
}

function kpi(ico,l,v,s) {
  return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">'
    +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div>'
    +'<div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'
    +(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')
    +'</div>';
}

function buildModal() {
  return '<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:520px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="m-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Versicherung hinzufügen</h3>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;grid-column:1/-1;">'+lbl('Versicherungstyp')+'<select id="v-typ" style="'+inputStyle+'">'
    +Object.keys(VS_TYPEN).map(function(t){ return '<option>'+t+'</option>'; }).join('')
    +'</select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;">'+lbl('Versicherungsgesellschaft')+'<input id="v-ges" style="'+inputStyle+'" placeholder="z.B. Allianz AG"></div>'
    +'<div style="margin-bottom:12px;">'+lbl('Vertragsnummer')+'<input id="v-num" style="'+inputStyle+'" placeholder="z.B. VS-12345"></div>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'+lbl('Objekt / Adresse')+'<input id="v-obj" style="'+inputStyle+'" placeholder="z.B. Musterstr. 1, 80331 München"></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;">'+lbl('Vertragsbeginn')+'<input id="v-beg" type="date" style="'+inputStyle+'"></div>'
    +'<div style="margin-bottom:12px;">'+lbl('Ablaufdatum')+'<input id="v-abl" type="date" style="'+inputStyle+'"></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;">'+lbl('Jahresprämie (€)')+'<input id="v-pra" type="number" step="0.01" style="'+inputStyle+'" placeholder="1200"></div>'
    +'<div style="margin-bottom:12px;">'+lbl('Zahlweise')+'<select id="v-zahl" style="'+inputStyle+'"><option>Jährlich</option><option>Halbjährlich</option><option>Vierteljährlich</option><option>Monatlich</option></select></div>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'+lbl('Notizen')+'<textarea id="v-notiz" style="'+inputStyle+'height:70px;resize:vertical;" placeholder="Besondere Klauseln, Ansprechpartner..."></textarea></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeAdd()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveVs()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function openAdd() {
  editId = null;
  document.getElementById('m-title').textContent = 'Versicherung hinzufügen';
  ['v-ges','v-num','v-obj','v-pra','v-notiz'].forEach(function(x){ document.getElementById(x).value=''; });
  document.getElementById('v-beg').value = today();
  document.getElementById('v-abl').value = '';
  document.getElementById('v-typ').value = 'Gebäudeversicherung';
  document.getElementById('v-zahl').value = 'Jährlich';
  document.getElementById('add-modal').style.display = 'flex';
}

function openEdit(id) {
  var v = getData(KEYS.versicherungen, []).find(function(x){ return x.id===id; }); if (!v) return;
  editId = id;
  document.getElementById('m-title').textContent = 'Versicherung bearbeiten';
  document.getElementById('v-typ').value = v.typ||'Gebäudeversicherung';
  document.getElementById('v-ges').value = v.gesellschaft||'';
  document.getElementById('v-num').value = v.nummer||'';
  document.getElementById('v-obj').value = v.objekt||'';
  document.getElementById('v-beg').value = v.beginn||'';
  document.getElementById('v-abl').value = v.ablauf||'';
  document.getElementById('v-pra').value = v.praemie||'';
  document.getElementById('v-zahl').value = v.zahlweise||'Jährlich';
  document.getElementById('v-notiz').value = v.notiz||'';
  document.getElementById('add-modal').style.display = 'flex';
}

function closeAdd() { document.getElementById('add-modal').style.display='none'; }

function saveVs() {
  var ges = document.getElementById('v-ges').value.trim();
  if (!ges) { alert('Bitte Versicherungsgesellschaft eingeben.'); return; }
  var list = getData(KEYS.versicherungen, []);
  var obj = { id: editId||gid(), typ: document.getElementById('v-typ').value,
    gesellschaft: ges, nummer: document.getElementById('v-num').value.trim(),
    objekt: document.getElementById('v-obj').value.trim(), beginn: document.getElementById('v-beg').value,
    ablauf: document.getElementById('v-abl').value, praemie: document.getElementById('v-pra').value,
    zahlweise: document.getElementById('v-zahl').value, notiz: document.getElementById('v-notiz').value.trim() };
  if (editId) { var idx=list.findIndex(function(x){return x.id===editId;}); if(idx>=0) list[idx]=obj; }
  else list.unshift(obj);
  setData(KEYS.versicherungen, list); syncToFirebase(uid); closeAdd(); render();
}

function deleteVs(id) {
  if (!confirm('Versicherung löschen?')) return;
  setData(KEYS.versicherungen, getData(KEYS.versicherungen,[]).filter(function(x){return x.id!==id;}));
  syncToFirebase(uid); render();
}

initFirebase();
loadFromFirebase(uid, function(){ render(); });
</script>
</body>
</html>
