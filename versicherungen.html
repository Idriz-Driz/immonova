<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – Versicherungen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body>
<script>
checkAuth(); checkTrial();
var user = getUser(); var uid = user.uid;
var appData = {}; var editId = null;
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;outline:none;box-sizing:border-box;';
var ARTEN = {Gebäude:'🏠',Haftpflicht:'⚖️',Elementar:'🌊',Brand:'🔥',Hausrat:'🛋️',Rechtsschutz:'⚡',Sonstiges:'📋'};
function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl() { return 'display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;'; }
function fg(label,id,type,ph) { return '<div style="margin-bottom:12px;"><label style="'+lbl()+'">'+label+'</label><input id="'+id+'" type="'+type+'" placeholder="'+ph+'" style="'+inputStyle+'"></div>'; }
function fmtEur(n) { return (Number(n)||0).toLocaleString('de-DE')+' €'; }
function fmtDate(d) { if(!d) return '–'; var x=new Date(d); return isNaN(x)?d:x.toLocaleDateString('de-DE'); }
function daysUntil(d) { if(!d) return 9999; return Math.ceil((new Date(d)-new Date())/(1000*60*60*24)); }

function render() {
  var vers = appData.versicherungen || [];
  var qTyp = (document.getElementById('f-typ')||{}).value||'';
  var qQ = ((document.getElementById('f-q')||{}).value||'').toLowerCase();
  var filtered = vers.filter(function(v){
    if (qTyp && v.art!==qTyp) return false;
    if (qQ && !(v.name+v.gesellschaft+v.objekt+'').toLowerCase().includes(qQ)) return false;
    return true;
  });
  var aktiv = vers.filter(function(v){ return daysUntil(v.ende)>=0; }).length;
  var bald = vers.filter(function(v){ var d=daysUntil(v.ende); return d>=0&&d<=30; }).length;
  var sumPraemien = vers.reduce(function(s,v){ return s+(Number(v.praemie)||0); },0);

  var warnHtml = '';
  if (bald > 0) {
    warnHtml = '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;">'
      +'<span style="font-size:22px;">⚠️</span>'
      +'<div><strong style="color:#d97706;">'+bald+' Versicherung'+(bald>1?'en':'')+' läuft in den nächsten 30 Tagen ab!</strong>'
      +'<div style="font-size:12px;color:#92400e;margin-top:2px;">Bitte rechtzeitig verlängern.</div></div></div>';
  }

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;">'
    +kpi('🔒','Gesamt',vers.length,'')
    +kpi('✅','Aktiv',aktiv,'')
    +kpi('⚠️','Läuft bald ab',bald,'≤ 30 Tage')
    +kpi('💰','Jahresprämien',fmtEur(sumPraemien),'')
    +'</div>';

  var filterHtml = '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">'
    +'<input id="f-q" oninput="render()" value="'+esc(qQ)+'" placeholder="🔍 Suchen..." style="'+inputStyle+'max-width:220px;">'
    +'<select id="f-typ" onchange="render()" style="'+inputStyle+'max-width:180px;"><option value="">Alle Arten</option>'+Object.keys(ARTEN).map(function(a){ return '<option value="'+a+'"'+(qTyp===a?' selected':'')+'>'+ARTEN[a]+' '+a+'</option>'; }).join('')+'</select>'
    +'</div>';

  var cardsHtml = '';
  if (!filtered.length) {
    cardsHtml = emptyState('🔒','Keine Versicherungen','Füge deine erste Versicherung hinzu','+ Versicherung hinzufügen','openAdd()');
  } else {
    cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">';
    filtered.forEach(function(v) {
      var d = daysUntil(v.ende);
      var statusCol = d<0?'#dc2626':d<=30?'#ea580c':'#16a34a';
      var statusTxt = d<0?'Abgelaufen':d<=30?'Läuft ab in '+d+' Tagen':'Aktiv';
      var ico = ARTEN[v.art]||'📋';
      cardsHtml += '<div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-top:4px solid '+statusCol+';">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">'
        +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<div style="font-size:28px;">'+ico+'</div>'
        +'<div><div style="font-size:15px;font-weight:700;color:#0f172a;">'+esc(v.name||'–')+'</div>'
        +'<div style="font-size:12px;color:#64748b;">'+esc(v.gesellschaft||'–')+'</div></div></div>'
        +'<span style="background:'+statusCol+'20;color:'+statusCol+';font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">'+statusTxt+'</span></div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">'
        +'<div style="background:#f8fafc;border-radius:8px;padding:10px;"><div style="font-size:10px;color:#94a3b8;">Versicherungssumme</div><div style="font-size:15px;font-weight:700;color:#0f172a;">'+fmtEur(v.summe)+'</div></div>'
        +'<div style="background:#f8fafc;border-radius:8px;padding:10px;"><div style="font-size:10px;color:#94a3b8;">Jahresprämie</div><div style="font-size:15px;font-weight:700;color:#2563eb;">'+fmtEur(v.praemie)+'</div></div>'
        +'</div>'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:4px;">📍 '+esc(v.objekt||'–')+'</div>'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:4px;">Nr. '+esc(v.nummer||'–')+'</div>'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:14px;">📅 '+fmtDate(v.beginn)+' – '+fmtDate(v.ende)+'</div>'
        +'<div style="display:flex;gap:8px;">'
        +(v.tel?'<a href="tel:'+esc(v.tel)+'" style="flex:1;padding:8px;border-radius:8px;background:#f0fdf4;color:#16a34a;font-size:12px;font-weight:700;text-decoration:none;text-align:center;">📞 Anrufen</a>':'')
        +'<button onclick="openEdit(\''+v.id+'\')" style="'+(v.tel?'':'flex:1;')+'padding:8px'+(v.tel?';width:36px':'')+'px;border-radius:8px;border:none;background:#eff6ff;color:#2563eb;cursor:pointer;">✏️</button>'
        +'<button onclick="deleteV(\''+v.id+'\')" style="width:36px;border-radius:8px;border:none;background:#fef2f2;color:#dc2626;cursor:pointer;">🗑️</button>'
        +'</div></div>';
    });
    cardsHtml += '</div>';
  }

  var actionBtn = '<button onclick="openAdd()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Versicherung hinzufügen</button>';
  var main = '<div style="padding:24px;">'+getTrialBanner()+warnHtml+kpiHtml+filterHtml+cardsHtml+'</div>';
  document.body.innerHTML = renderLayout('versicherungen','Versicherungen',actionBtn,main,buildModal());
}

function kpi(ico,l,v,s) { return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);"><div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div><div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'+(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')+'</div>'; }

function buildModal() {
  return '<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:520px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="m-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Versicherung</h3>'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Versicherungsart</label><select id="v-art" style="'+inputStyle+'">'+Object.keys(ARTEN).map(function(a){ return '<option>'+a+'</option>'; }).join('')+'</select></div>'
    +fg('Versicherungsname','v-name','text','z.B. Gebäudeversicherung Musterstr.')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Gesellschaft','v-ges','text','z.B. Allianz')
    +fg('Objekt','v-obj','text','Musterstr. 1')
    +'</div>'
    +fg('Versicherungsnummer','v-nr','text','VN-12345')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Versicherungssumme (€)','v-summe','number','500000')
    +fg('Jahresprämie (€)','v-praemie','number','1200')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Beginn','v-beginn','date','')
    +fg('Ende','v-ende','date','')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Selbstbeteiligung (€)','v-sb','number','500')
    +fg('Telefon Versicherer','v-tel','tel','+49 89 ...')
    +'</div>'
    +fg('Ansprechpartner','v-ap','text','Max Muster')
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Notizen</label><textarea id="v-notizen" style="'+inputStyle+'height:80px;resize:vertical;"></textarea></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeAdd()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveV()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function openAdd() { editId=null; document.getElementById('m-title').textContent='Versicherung hinzufügen'; ['v-name','v-ges','v-obj','v-nr','v-summe','v-praemie','v-beginn','v-ende','v-sb','v-tel','v-ap','v-notizen'].forEach(function(i){ var el=document.getElementById(i); if(el) el.value=''; }); document.getElementById('add-modal').style.display='flex'; }
function openEdit(id) {
  var v = (appData.versicherungen||[]).find(function(x){return x.id===id;}); if(!v) return; editId=id;
  document.getElementById('m-title').textContent='Versicherung bearbeiten';
  var map = {art:'v-art',name:'v-name',gesellschaft:'v-ges',objekt:'v-obj',nummer:'v-nr',summe:'v-summe',praemie:'v-praemie',beginn:'v-beginn',ende:'v-ende',selbstbeteiligung:'v-sb',tel:'v-tel',ansprechpartner:'v-ap',notizen:'v-notizen'};
  Object.keys(map).forEach(function(k){ var el=document.getElementById(map[k]); if(el) el.value=v[k]||''; });
  document.getElementById('add-modal').style.display='flex';
}
function closeAdd() { document.getElementById('add-modal').style.display='none'; }
function saveV() {
  var name=document.getElementById('v-name').value.trim(); if(!name){alert('Bitte Name eingeben.');return;}
  var vers=appData.versicherungen||[];
  var obj={id:editId||gid(),art:document.getElementById('v-art').value,name:name,gesellschaft:document.getElementById('v-ges').value.trim(),objekt:document.getElementById('v-obj').value.trim(),nummer:document.getElementById('v-nr').value.trim(),summe:document.getElementById('v-summe').value,praemie:document.getElementById('v-praemie').value,beginn:document.getElementById('v-beginn').value,ende:document.getElementById('v-ende').value,selbstbeteiligung:document.getElementById('v-sb').value,tel:document.getElementById('v-tel').value.trim(),ansprechpartner:document.getElementById('v-ap').value.trim(),notizen:document.getElementById('v-notizen').value.trim()};
  if(editId){var idx=vers.findIndex(function(x){return x.id===editId;}); if(idx>=0) vers[idx]=obj;}else vers.unshift(obj);
  appData.versicherungen=vers; syncToFirebase(uid); closeAdd(); render();
}
function deleteV(id) { if(!confirm('Versicherung löschen?')) return; appData.versicherungen=(appData.versicherungen||[]).filter(function(x){return x.id!==id;}); syncToFirebase(uid); render(); }

initFirebase();
loadFromFirebase(uid, function(d) { if(d) appData=d; if(!appData.versicherungen) appData.versicherungen=[]; render(); });
</script>
</body>
</html>
