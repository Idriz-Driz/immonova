<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoNova – ⚙️ Einstellungen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="shared.js"></script>
</head>
<body style="margin:0;padding:0;">
<script>
if(!checkAuth()) { window.location.href='login.html'; }
var user = getUser();
function render() {
  renderLayout('einstellungen','⚙️ Einstellungen','',
    '<div style="padding:60px;text-align:center;background:white;border:1px solid #e2e8f0;border-radius:12px;">'
    +'<div style="font-size:56px;margin-bottom:16px;">⚙️</div>'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:8px;">⚙️ Einstellungen</div>'
    +'<div style="font-size:14px;color:#64748b;margin-bottom:24px;">Diese Seite wird bald fertiggestellt.</div>'
    +'<a href="app.html" style="background:#2563eb;color:white;border-radius:9px;padding:10px 24px;font-size:14px;font-weight:600;text-decoration:none;">Zum Dashboard</a>'
    +'</div>'
  );
}
initFirebase(); loadFromFirebase(user.uid, render);
</script>
</body>
</html>
