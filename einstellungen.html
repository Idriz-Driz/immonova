<style>
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.settings-anim { animation: fadeIn 0.18s ease; }
.toggle-wrap { display:inline-flex; align-items:center; cursor:pointer; gap:10px; }
.toggle-track {
  width:44px; height:24px; background:#cbd5e1; border-radius:12px;
  position:relative; transition:background 0.22s; flex-shrink:0;
}
.toggle-track.on { background:#2563eb; }
.toggle-thumb {
  position:absolute; top:3px; left:3px;
  width:18px; height:18px; background:white; border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
  transition:left 0.22s;
}
.toggle-track.on .toggle-thumb { left:23px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; cursor:pointer; border-radius:0;
  font-size:13px; font-weight:500; color:#64748b;
  border-left:3px solid transparent;
  transition:all 0.15s; text-decoration:none; background:none; border-top:none; border-right:none; border-bottom:none; width:100%; text-align:left; font-family:inherit;
  border-left:3px solid transparent;
}
.nav-item:hover { background:#f8fafc; color:#0f172a; }
.nav-item.active { color:#2563eb; background:#eff6ff; border-left:3px solid #2563eb; font-weight:600; }
.section-card {
  background:white; border-radius:16px; padding:24px;
  box-shadow:0 1px 4px rgba(0,0,0,0.07); border:1px solid #e2e8f0;
  margin-bottom:20px;
}
.section-card.danger { border-left:4px solid #dc2626; background:#fff8f8; }
.section-title { font-size:15px; font-weight:700; color:#0f172a; margin-bottom:18px; }
.coming-soon {
  display:inline-flex; align-items:center;
  background:#f1f5f9; color:#64748b;
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px;
  letter-spacing:0.3px; margin-left:6px; vertical-align:middle;
}
.save-btn {
  background:#2563eb; color:white; border:none; border-radius:10px;
  padding:11px 26px; font-size:14px; font-weight:600; cursor:pointer;
  font-family:inherit; box-shadow:0 2px 8px rgba(37,99,235,0.28);
  transition:background 0.15s;
}
.save-btn:hover { background:#1d4ed8; }
.danger-btn {
  background:white; color:#dc2626; border:2px solid #dc2626;
  border-radius:9px; padding:10px 22px; font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all 0.15s;
}
.danger-btn:hover { background:#dc2626; color:white; }
.success-msg {
  display:none; background:#f0fdf4; border:1px solid #bbf7d0;
  color:#16a34a; padding:11px 16px; border-radius:10px;
  font-size:13px; font-weight:600; margin-bottom:16px; text-align:center;
}
.error-msg {
  display:none; background:#fef2f2; border:1px solid #fecaca;
  color:#dc2626; padding:11px 16px; border-radius:10px;
  font-size:13px; font-weight:600; margin-bottom:16px;
}
.role-badge {
  display:inline-flex; align-items:center; font-size:11px; font-weight:700;
  padding:3px 9px; border-radius:20px;

<body style="margin:0;padding:0;">
<script>
checkAuth();
checkTrial();
initFirebase();

var user = getUser();
var activeTab = (window.location.hash || '#profil').replace('#','') || 'profil';

// ─── PLAN CONFIG ──────────────────────────────────────────
var PLAN_CONFIG = {
  starter:    { label:'Starter',    farbe:'#2563eb', bg:'#eff6ff',  preis:'0',  features:['5 Einheiten','Dashboard','Mieter-Verwaltung','Ticket-System','Basis-Berichte'] },
  pro:        { label:'Pro',        farbe:'#7c3aed', bg:'#f5f3ff',  preis:'29', features:['50 Einheiten','Alles aus Starter','CRM & Interessenten','Erweiterte Berichte','Handwerker-Portal'] },
  business:   { label:'Business',   farbe:'#d97706', bg:'#fffbeb',  preis:'79', features:['200 Einheiten','Alles aus Pro','API-Zugang','Prioritätssupport','Team-Funktionen'] },
  enterprise: { label:'Enterprise', farbe:'#0f172a', bg:'#f1f5f9',  preis:'–', features:['Unbegrenzte Einheiten','Alles aus Business','Dedizierter Betreuer','SLA-Garantie','Custom Integrationen'] }
};

// ─── NOTIFICATION PREFS ───────────────────────────────────
function getNotifPrefs() {
  var def = {
    email_global:true, email_tickets:true, email_done:false,
    email_nachrichten:true, email_termine:true, email_mietende:true,
    email_zahlung:true,
    app_global:true, app_tickets:true, app_done:true,
    app_nachrichten:true, app_termine:true, app_mietende:false,
    app_zahlung:true
  };
  try {
    var stored = JSON.parse(localStorage.getItem('in_notifications_prefs'));
    if (stored) return Object.assign(def, stored);
  } catch(e) {}
  return def;
}

// ─── TAB SWITCH ───────────────────────────────────────────
function setTab(t) {
  activeTab = t;
  window.location.hash = t;
  render();
}

// ─── TOGGLE SWITCH CLICK ──────────────────────────────────
function toggleSwitch(id) {
  var track = document.getElementById('toggle-' + id);
  if (!track) return;
  track.classList.toggle('on');
}

function getToggleVal(id) {
  var el = document.getElementById('toggle-' + id);
  return el ? el.classList.contains('on') : false;
}

// ─── SAVE PROFILE ─────────────────────────────────────────
function saveProfile() {
  var vn  = (document.getElementById('p-vn')  || {}).value || '';
  var nn  = (document.getElementById('p-nn')  || {}).value || '';
  var tel = (document.getElementById('p-tel') || {}).value || '';
  var bio = (document.getElementById('p-bio') || {}).value || '';
  var lang= (document.getElementById('p-lang')|| {}).value || 'de';
  var tz  = (document.getElementById('p-tz')  || {}).value || 'Europe/Berlin';
  vn = vn.trim(); nn = nn.trim();
  if (!vn) { alert('Bitte Vornamen eingeben.'); return; }
  var fullName = (vn + ' ' + nn).trim();
  localStorage.setItem('in_user_name', fullName);
  localStorage.setItem('in_user_tel', tel.trim());
  localStorage.setItem('in_user_bio', bio.trim());
  localStorage.setItem('in_user_lang', lang);
  localStorage.setItem('in_user_tz', tz);
  if (typeof firebase !== 'undefined' && firebase.apps.length) {
    var uid = user.uid;
    if (uid && uid !== 'admin') {
      firebase.firestore().collection('users').doc(uid).update({
        name: fullName, tel: tel.trim(), bio: bio.trim(), lang: lang, tz: tz
      }).catch(function(){});
    }
  }
  addNotif('✅', 'Profil aktualisiert: ' + fullName);
  syncToFirebase(user.uid);
  var msg = document.getElementById('profil-msg');
  if (msg) { msg.style.display='block'; setTimeout(function(){ msg.style.display='none'; }, 3500); }
}

// ─── CHANGE PASSWORD ──────────────────────────────────────
function changePassword() {
  var cur  = (document.getElementById('pw-cur')  || {}).value || '';
  var neu  = (document.getElementById('pw-neu')  || {}).value || '';
  var best = (document.getElementById('pw-best') || {}).value || '';
  var msg  = document.getElementById('pw-msg');
  if (!neu || neu.length < 6) { showMsg(msg, 'Neues Passwort muss mindestens 6 Zeichen haben.', true); return; }
  if (neu !== best) { showMsg(msg, 'Passwörter stimmen nicht überein.', true); return; }
  if (typeof firebase !== 'undefined' && firebase.auth().currentUser) {
    firebase.auth().currentUser.updatePassword(neu).then(function(){
      addNotif('🔒', 'Passwort erfolgreich geändert');
      showMsg(msg, 'Passwort erfolgreich geändert ✅', false);
    }).catch(function(e){
      showMsg(msg, 'Fehler: ' + e.message, true);
    });
  } else {
    showMsg(msg, 'Passwort geändert (Demo-Modus) ✅', false);
  }
}

function showMsg(el, text, isError) {
  if (!el) return;
  el.style.display = 'block';
  el.textContent = text;
  if (isError) {
    el.style.background='#fef2f2'; el.style.borderColor='#fecaca'; el.style.color='#dc2626';
  } else {
    el.style.background='#f0fdf4'; el.style.borderColor='#bbf7d0'; el.style.color='#16a34a';
  }
  setTimeout(function(){ el.style.display='none'; }, 4000);
}

// ─── DELETE ACCOUNT ───────────────────────────────────────
function deleteAccount() {
  if (!confirm('Bist du sicher? Dein Konto und alle Daten werden unwiderruflich gelöscht!')) return;
  if (!confirm('Letzte Warnung: Alle Daten gehen verloren. Wirklich fortfahren?')) return;
  if (typeof firebase !== 'undefined' && firebase.auth().currentUser) {
    firebase.auth().currentUser.delete().then(function(){
      localStorage.clear();
      window.location.href = 'login.html';
    }).catch(function(e){ alert('Fehler: ' + e.message); });
  } else {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}

// ─── SAVE FIRMA ───────────────────────────────────────────
function saveFirma() {
  var fields = ['f-name','f-adr','f-plz','f-stadt','f-land','f-tel','f-email','f-web','f-steuernr','f-handelsreg'];
  var keys   = ['firma_name','firma_adr','firma_plz','firma_stadt','firma_land','firma_tel','firma_email','firma_web','firma_steuernr','firma_handelsreg'];
  fields.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) localStorage.setItem('in_' + keys[i], el.value.trim());
  });
  addNotif('🏢', 'Firmendaten gespeichert');
  syncToFirebase(user.uid);
  var msg = document.getElementById('firma-msg');
  if (msg) { msg.style.display='block'; setTimeout(function(){ msg.style.display='none'; }, 3500); }
}

// ─── SAVE NOTIFICATIONS ───────────────────────────────────
function saveNotifications() {
  var keys = [
    'email_global','email_tickets','email_done','email_nachrichten','email_termine','email_mietende','email_zahlung',
    'app_global','app_tickets','app_done','app_nachrichten','app_termine','app_mietende','app_zahlung'
  ];
  var prefs = {};
  keys.forEach(function(k){ prefs[k] = getToggleVal(k); });
  localStorage.setItem('in_notifications_prefs', JSON.stringify(prefs));
  addNotif('🔔', 'Benachrichtigungseinstellungen gespeichert');
  var msg = document.getElementById('notif-save-msg');
  if (msg) { msg.style.display='block'; setTimeout(function(){ msg.style.display='none'; }, 3000); }
}

// ─── SAVE APPEARANCE ──────────────────────────────────────
function saveAppearance() {
  var schema   = (document.getElementById('ap-schema')  || {}).value || 'light';
  var fontsize = (document.getElementById('ap-fontsize') || {}).value || 'normal';
  var compact  = getToggleVal('ap-compact');
  localStorage.setItem('in_appearance_schema', schema);
  localStorage.setItem('in_appearance_fontsize', fontsize);
  localStorage.setItem('in_appearance_compact', compact ? '1' : '0');
  addNotif('🎨', 'Erscheinungsbild gespeichert');
  var msg = document.getElementById('appear-msg');
  if (msg) { msg.style.display='block'; setTimeout(function(){ msg.style.display='none'; }, 3000); }
}

// ─── EXPORT DATA ──────────────────────────────────────────
function exportData() {
  var out = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    out[k] = localStorage.getItem(k);
  }
  var blob = new Blob([JSON.stringify(out, null, 2)], { type:'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'immonova-export-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
  addNotif('📥', 'Daten exportiert');
}

// ─── IMPORT DATA ──────────────────────────────────────────
function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      Object.keys(data).forEach(function(k){ localStorage.setItem(k, data[k]); });
      addNotif('📤', 'Daten importiert');
      alert('Import erfolgreich! Die Seite wird neu geladen.');
      window.location.reload();
    } catch(ex) {
      alert('Fehler beim Importieren: Ungültige JSON-Datei.');
    }
  };
  reader.readAsText(file);
}

// ─── MANUAL SYNC ──────────────────────────────────────────
function manualSync() {
  var btn = document.getElementById('sync-btn');
  if (btn) { btn.textContent = '⏳ Synchronisiere...'; btn.disabled = true; }
  syncToFirebase(user.uid);
  setTimeout(function(){
    if (btn) { btn.textContent = '🔄 Firestore Sync'; btn.disabled = false; }
    addNotif('🔄', 'Manuell mit Firestore synchronisiert');
    var msg = document.getElementById('sync-msg');
    if (msg) { msg.style.display='block'; setTimeout(function(){ msg.style.display='none'; }, 3000); }
  }, 1200);
}

// ─── DELETE LOCAL DATA ────────────────────────────────────
function deleteLocalData() {
  if (!confirm('Alle lokalen Daten löschen? Die Seite wird danach neu geladen.')) return;
  localStorage.clear();
  window.location.href = 'login.html';
}

// ─── STORAGE SIZE ─────────────────────────────────────────
function getStorageSize() {
  var total = 0;
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    total += (localStorage.getItem(k) || '').length + k.length;
  }
  return (total / 1024).toFixed(1);
}

// ─── INVITE TEAM MEMBER ───────────────────────────────────
function inviteTeamMember() {
  var email = (document.getElementById('invite-email') || {}).value || '';
  var rolle = (document.getElementById('invite-rolle') || {}).value || 'mitarbeiter';
  if (!email || email.indexOf('@') < 0) { alert('Bitte gültige E-Mail eingeben.'); return; }
  if (typeof firebase !== 'undefined' && firebase.apps.length) {
    firebase.firestore().collection('invites').add({
      email: email.trim(), rolle: rolle,
      firma: user.firma, eingeladen_von: user.uid,
      eingeladen_am: new Date().toISOString(), status: 'ausstehend'
    }).then(function(){
      addNotif('👥', 'Einladung an ' + email + ' gesendet');
      hideModal('modal-invite');
      alert('Einladung gesendet! (' + email + ')');
    }).catch(function(e){ alert('Fehler: ' + e.message); });
  } else {
    alert('Einladung gesendet (Demo): ' + email);
    hideModal('modal-invite');
  }
}

// ─── REMOVE TEAM MEMBER ───────────────────────────────────
function removeTeamMember(uid) {
  if (!confirm('Mitarbeiter wirklich entfernen?')) return;
  if (typeof firebase !== 'undefined' && firebase.apps.length) {
    firebase.firestore().collection('users').doc(uid).update({ status:'inaktiv' })
      .then(function(){ addNotif('👥', 'Mitarbeiter entfernt'); render(); })
      .catch(function(e){ alert('Fehler: ' + e.message); });
  } else {
    alert('Mitarbeiter entfernt (Demo-Modus)');
  }
}

// ─── LOAD TEAM MEMBERS ───────────────────────────────────
var teamMembers = [];
function loadTeamMembers(callback) {
  if (typeof firebase === 'undefined' || !firebase.apps.length) {
    teamMembers = [
      { uid:'u1', name:'Max Mustermann',  email:'max@mustermann.de',    rolle:'admin',      status:'aktiv' },
      { uid:'u2', name:'Anna Schmidt',    email:'anna@schmidt.de',       rolle:'verwalter',  status:'aktiv' },
      { uid:'u3', name:'Tom Meier',       email:'tom.meier@example.de',  rolle:'mitarbeiter',status:'aktiv' }
    ];
    if (callback) callback();
    return;
  }
  firebase.firestore().collection('users').where('firma','==', user.firma || '').get()
    .then(function(snap){
      teamMembers = [];
      snap.forEach(function(doc){
        var d = doc.data();
        teamMembers.push({ uid: doc.id, name: d.name||'–', email: d.email||'–', rolle: d.role||'mitarbeiter', status: d.status||'aktiv' });
      });
      if (callback) callback();
    })
    .catch(function(){ if (callback) callback(); });
}

// ─── BUILD TOGGLE ROW ─────────────────────────────────────
function toggleRow(id, label, initialOn) {
  var onClass = initialOn ? ' on' : '';
  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;">'
    + '<span style="font-size:13px;color:#374151;">' + label + '</span>'
    + '<label class="toggle-wrap" onclick="toggleSwitch(\'' + id + '\')">'
    +   '<div id="toggle-' + id + '" class="toggle-track' + onClass + '"><div class="toggle-thumb"></div></div>'
    + '</label>'
    + '</div>';
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  var u    = getUser();
  var role = u.role;
  var planKey = (u.plan||'starter').toLowerCase();
  var plan    = PLAN_CONFIG[planKey] || PLAN_CONFIG.starter;
  var initial = (u.name||'?')[0].toUpperCase();
  var nameParts = u.name.split(' ');
  var vn  = nameParts[0] || '';
  var nn  = nameParts.slice(1).join(' ') || '';
  var tel = localStorage.getItem('in_user_tel') || '';
  var bio = localStorage.getItem('in_user_bio') || '';
  var lang = localStorage.getItem('in_user_lang') || 'de';
  var tz   = localStorage.getItem('in_user_tz')  || 'Europe/Berlin';
  var prefs = getNotifPrefs();
  var isAdminRole = (role === 'admin' || role === 'superadmin' || role === 'verwalter');

  // ── NAV ITEM BUILDER ──────────────────────────────────
  function navItem(id, ico, label, onlyAdmin) {
    if (onlyAdmin && !isAdminRole) return '';
    var active = activeTab === id;
    return '<button class="nav-item' + (active?' active':'') + '" onclick="setTab(\'' + id + '\')">'
      + '<span style="font-size:15px;width:20px;text-align:center;flex-shrink:0;">' + ico + '</span>'
      + '<span>' + label + '</span>'
      + '</button>';
  }

  // ── LEFT NAV ──────────────────────────────────────────
  var leftNav =
    '<div style="width:200px;flex-shrink:0;background:white;border-right:1px solid #e2e8f0;padding:16px 0;overflow-y:auto;">'
    + '<div style="padding:0 16px 12px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.6px;">Einstellungen</div>'
    + navItem('profil',           '👤', 'Profil')
    + navItem('sicherheit',       '🔒', 'Sicherheit')
    + navItem('firma',            '🏢', 'Firma')
    + navItem('plan',             '💳', 'Plan & Abrechnung')
    + navItem('benachrichtigungen','🔔', 'Benachrichtigungen')
    + navItem('erscheinungsbild', '🎨', 'Erscheinungsbild')
    + navItem('daten',            '🗄️', 'Daten & Export')
    + navItem('integrationen',    '🔌', 'Integrationen')
    + navItem('team',             '👥', 'Team', true)
    + '</div>';

  // ═══════════════════════════════════════════════════════
  // TAB: PROFIL
  // ═══════════════════════════════════════════════════════
  var profilHTML =
    '<div class="settings-anim">'

    // Avatar block
    + '<div class="section-card" style="text-align:center;padding:28px;">'
    +   '<div style="width:88px;height:88px;background:linear-gradient(135deg,#2563eb,#3b82f6);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:white;box-shadow:0 4px 18px rgba(37,99,235,0.35);margin-bottom:14px;">' + initial + '</div>'
    +   '<div style="font-size:16px;font-weight:700;color:#0f172a;">' + u.name + '</div>'
    +   '<div style="font-size:12px;color:#64748b;margin-bottom:14px;">' + u.email + '</div>'
    +   '<button onclick="alert(\'Foto-Upload kommt in Kürze!\')" style="background:#f1f5f9;color:#374151;border:1px solid #e2e8f0;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">📷 Foto ändern</button>'
    + '</div>'

    + '<div class="section-card">'
    +   '<div class="section-title">👤 Persönliche Daten</div>'
    +   '<div id="profil-msg" class="success-msg">Profil aktualisiert ✅</div>'
    +   '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;">'
    +     formGroup('Vorname', '<input id="p-vn" ' + inputStyle + ' value="' + vn + '" placeholder="Max">')
    +     formGroup('Nachname', '<input id="p-nn" ' + inputStyle + ' value="' + nn + '" placeholder="Mustermann">')
    +   '</div>'
    +   formGroup('E-Mail',
        '<div style="display:flex;align-items:center;gap:10px;">'
        + '<input style="width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#94a3b8;background:#f8fafc;outline:none;box-sizing:border-box;" value="' + u.email + '" readonly>'
        + '<a href="#" onclick="alert(\'E-Mail-Änderung kommt in Kürze!\')" style="font-size:12px;color:#2563eb;white-space:nowrap;text-decoration:none;font-weight:600;">E-Mail ändern</a>'
        + '</div>'
