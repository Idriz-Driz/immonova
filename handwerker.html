<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwerker – ImmoNova</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body style="margin:0;padding:0;">
<script>
checkAuth();
checkTrial();

var user = getUser();
var editId = null;
var searchQuery = '';
var gewerkFilter = 'alle';

// ─── GEWERK CONFIG ────────────────────────────────────────
var GEWERK_LIST = [
  { val: 'Sanitär',    ico: '🚿' },
  { val: 'Elektriker', ico: '⚡' },
  { val: 'Maler',      ico: '🎨' },
  { val: 'Schlosser',  ico: '🔑' },
  { val: 'Dachdecker', ico: '🏠' },
  { val: 'Gärtner',    ico: '🌿' },
  { val: 'Reinigung',  ico: '🧹' },
  { val: 'Tischler',   ico: '🪵' },
  { val: 'HLS',        ico: '🔧' },
  { val: 'Sonstiges',  ico: '🔩' }
];

function gewerkIcon(gewerk) {
  for (var i = 0; i < GEWERK_LIST.length; i++) {
    if (GEWERK_LIST[i].val === gewerk) return GEWERK_LIST[i].ico;
  }
  return '🔩';
}

// ─── DATA ─────────────────────────────────────────────────
function getHW() {
  return getData(KEYS.handwerker, []);
}

function getTickets() {
  return getData(KEYS.tickets, []);
}

// ─── STAR RATING ──────────────────────────────────────────
function starRating(n) {
  n = Math.max(0, Math.min(5, Math.round(n || 0)));
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

// ─── ACTIVE ORDERS ────────────────────────────────────────
function getActiveOrders(hw) {
  var name = ((hw.vn || '') + ' ' + (hw.nn || '')).trim().toLowerCase();
  var firma = (hw.firma || '').toLowerCase();
  var tickets = getTickets();
  var count = 0;
  for (var i = 0; i < tickets.length; i++) {
    var t = tickets[i];
    if (t.status === 'Erledigt') continue;
    var hw_field = (t.handwerker || t.hw || '').toLowerCase();
    if (hw_field && (hw_field.indexOf(name) >= 0 || (firma && hw_field.indexOf(firma) >= 0))) {
      count++;
    }
  }
  return count;
}

// ─── KPI ──────────────────────────────────────────────────
function getKPIs() {
  var hws = getHW();
  var tickets = getTickets();

  // Aktive Aufträge: tickets where handwerker is set and status != Erledigt
  var aktiveAuftraege = 0;
  for (var i = 0; i < tickets.length; i++) {
    var t = tickets[i];
    if (t.status !== 'Erledigt' && (t.handwerker || t.hw)) {
      aktiveAuftraege++;
    }
  }

  // Durchschnittliche Bewertung
  var bewSum = 0;
  var bewCount = 0;
  for (var j = 0; j < hws.length; j++) {
    if (hws[j].bewertung) {
      bewSum += parseFloat(hws[j].bewertung) || 0;
      bewCount++;
    }
  }
  var avgBew = bewCount > 0 ? Math.round((bewSum / bewCount) * 10) / 10 : 0;

  return { gesamt: hws.length, aktiveAuftraege: aktiveAuftraege, avgBew: avgBew, bewCount: bewCount };
}

// ─── AVATAR COLOR ─────────────────────────────────────────
function avatarColor(seed) {
  var colors = ['#2563eb', '#16a34a', '#d97706', '#dc2626', '#7c3aed', '#0891b2', '#be185d', '#0d9488'];
  var code = 0;
  for (var i = 0; i < (seed || '').length; i++) code += seed.charCodeAt(i);
  return colors[code % colors.length];
}

// ─── STATUS CONFIG ────────────────────────────────────────
function statusBadge(status) {
  if (status === 'Verfügbar')       return badge('Verfügbar',       'green');
  if (status === 'Beschäftigt')     return badge('Beschäftigt',     'yellow');
  if (status === 'Nicht verfügbar') return badge('Nicht verfügbar', 'red');
  return badge(status || 'Unbekannt', 'gray');
}

// ─── WHATSAPP LINK ────────────────────────────────────────
function waLink(tel) {
  var num = (tel || '').replace(/\D/g, '');
  if (num.charAt(0) === '0') num = '49' + num.slice(1);
  return 'https://wa.me/' + num;
}

// ─── MODAL STAR HELPERS ───────────────────────────────────
function updateModalStars(n) {
  document.getElementById('hw-bewertung').value = n;
  var stars = document.querySelectorAll('#modal-stars span');
  for (var i = 0; i < stars.length; i++) {
    stars[i].style.color = (i < n) ? '#f59e0b' : '#d1d5db';
  }
}

function hoverModalStar(n) {
  var stars = document.querySelectorAll('#modal-stars span');
  for (var i = 0; i < stars.length; i++) {
    stars[i].style.color = (i < n) ? '#f59e0b' : '#d1d5db';
  }
}

function unhoverModalStar() {
  var n = parseInt(document.getElementById('hw-bewertung').value) || 3;
  updateModalStars(n);
}

// ─── OPEN/CLOSE MODAL ─────────────────────────────────────
function openNewModal() {
  editId = null;
  document.getElementById('hw-modal-title').textContent = 'Handwerker hinzufügen';
  document.getElementById('hw-vn').value = '';
  document.getElementById('hw-nn').value = '';
  document.getElementById('hw-firma').value = '';
  document.getElementById('hw-gewerk').value = 'Sanitär';
  document.getElementById('hw-tel').value = '';
  document.getElementById('hw-email').value = '';
  document.getElementById('hw-adresse').value = '';
  document.getElementById('hw-stundensatz').value = '';
  document.getElementById('hw-status').value = 'Verfügbar';
  document.getElementById('hw-notizen').value = '';
  document.getElementById('hw-zertifikate').value = '';
  updateModalStars(3);
  showModal('hw-modal');
}

function openEditModal(id) {
  editId = id;
  var hws = getHW();
  var hw = null;
  for (var i = 0; i < hws.length; i++) {
    if (hws[i].id === id) { hw = hws[i]; break; }
  }
  if (!hw) return;
  document.getElementById('hw-modal-title').textContent = 'Handwerker bearbeiten';
  document.getElementById('hw-vn').value         = hw.vn         || '';
  document.getElementById('hw-nn').value         = hw.nn         || '';
  document.getElementById('hw-firma').value      = hw.firma      || '';
  document.getElementById('hw-gewerk').value     = hw.gewerk     || 'Sanitär';
  document.getElementById('hw-tel').value        = hw.tel        || '';
  document.getElementById('hw-email').value      = hw.email      || '';
  document.getElementById('hw-adresse').value    = hw.adresse    || '';
  document.getElementById('hw-stundensatz').value = hw.stundensatz || '';
  document.getElementById('hw-status').value     = hw.status     || 'Verfügbar';
  document.getElementById('hw-notizen').value    = hw.notizen    || '';
  document.getElementById('hw-zertifikate').value = hw.zertifikate || '';
  updateModalStars(hw.bewertung || 3);
  showModal('hw-modal');
}

// ─── SAVE ─────────────────────────────────────────────────
function saveHW() {
  var vn = document.getElementById('hw-vn').value.trim();
  var nn = document.getElementById('hw-nn').value.trim();
  if (!vn || !nn) { alert('Vor- und Nachname sind Pflichtfelder.'); return; }

  var hws = getHW();
  var obj = {
    id:          editId || ('hw_' + Date.now()),
    vn:          vn,
    nn:          nn,
    firma:       document.getElementById('hw-firma').value.trim(),
    gewerk:      document.getElementById('hw-gewerk').value,
    tel:         document.getElementById('hw-tel').value.trim(),
    email:       document.getElementById('hw-email').value.trim(),
    adresse:     document.getElementById('hw-adresse').value.trim(),
    stundensatz: parseFloat(document.getElementById('hw-stundensatz').value) || 0,
    bewertung:   parseInt(document.getElementById('hw-bewertung').value) || 3,
    status:      document.getElementById('hw-status').value,
    notizen:     document.getElementById('hw-notizen').value.trim(),
    zertifikate: document.getElementById('hw-zertifikate').value.trim()
  };

  if (editId) {
    for (var i = 0; i < hws.length; i++) {
      if (hws[i].id === editId) { hws[i] = obj; break; }
    }
  } else {
    hws.push(obj);
    addNotif('🔧', 'Neuer Handwerker hinzugefügt: ' + vn + ' ' + nn + ' (' + obj.gewerk + ')');
  }

  setData(KEYS.handwerker, hws);
  syncToFirebase(user.uid);
  hideModal('hw-modal');
  render();
}

// ─── DELETE ───────────────────────────────────────────────
function deleteHW(id) {
  if (!confirm('Handwerker wirklich löschen?')) return;
  var hws = getHW().filter(function (h) { return h.id !== id; });
  setData(KEYS.handwerker, hws);
  syncToFirebase(user.uid);
  render();
}

// ─── FILTER ───────────────────────────────────────────────
function applySearch(q) {
  searchQuery = q;
  render();
}

function applyGewerkFilter(g) {
  gewerkFilter = g;
  render();
}

function filteredHW() {
  var hws = getHW();
  var q = searchQuery.toLowerCase();
  return hws.filter(function (hw) {
    var matchSearch = !q
      || (hw.vn  || '').toLowerCase().indexOf(q) >= 0
      || (hw.nn  || '').toLowerCase().indexOf(q) >= 0
      || (hw.firma || '').toLowerCase().indexOf(q) >= 0
      || (hw.gewerk || '').toLowerCase().indexOf(q) >= 0
      || (hw.tel || '').indexOf(q) >= 0;
    var matchGewerk = gewerkFilter === 'alle' || hw.gewerk === gewerkFilter;
    return matchSearch && matchGewerk;
  });
}

// ─── BUILD KPI ROW ────────────────────────────────────────
function buildKPIRow(kpis) {
  function kpiCard(ico, label, value, sub, color) {
    return '<div style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,0.05);display:flex;align-items:center;gap:16px;">'
      + '<div style="width:48px;height:48px;border-radius:12px;background:' + color + ';display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">' + ico + '</div>'
      + '<div>'
      + '<div style="font-size:24px;font-weight:800;color:#0f172a;line-height:1.1;">' + value + '</div>'
      + '<div style="font-size:12px;font-weight:600;color:#64748b;margin-top:2px;">' + label + '</div>'
      + (sub ? '<div style="font-size:11px;color:#94a3b8;margin-top:1px;">' + sub + '</div>' : '')
      + '</div>'
      + '</div>';
  }

  var starDisplay = kpis.avgBew > 0
    ? '<span style="color:#f59e0b;letter-spacing:1px;">' + starRating(Math.round(kpis.avgBew)) + '</span> <span style="color:#64748b;font-size:12px;">(' + kpis.avgBew.toFixed(1) + ')</span>'
    : '<span style="color:#94a3b8;font-size:13px;">–</span>';

  return '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">'
    + kpiCard('🔧', 'Gesamt Handwerker', kpis.gesamt, 'Alle erfassten Handwerker', '#eff6ff')
    + kpiCard('📋', 'Aktive Aufträge', kpis.aktiveAuftraege, 'Laufende Tickets mit Handwerker', '#fef9c3')
    + '<div style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,0.05);display:flex;align-items:center;gap:16px;">'
    + '<div style="width:48px;height:48px;border-radius:12px;background:#fff7ed;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">⭐</div>'
    + '<div>'
    + '<div style="font-size:18px;font-weight:700;color:#0f172a;line-height:1.3;">' + starDisplay + '</div>'
    + '<div style="font-size:12px;font-weight:600;color:#64748b;margin-top:2px;">Durchschnittliche Bewertung</div>'
    + '<div style="font-size:11px;color:#94a3b8;margin-top:1px;">' + (kpis.bewCount > 0 ? 'Aus ' + kpis.bewCount + ' Handwerker(n)' : 'Noch keine Bewertungen') + '</div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

// ─── BUILD SEARCH + FILTER BAR ────────────────────────────
function buildFilterBar() {
  var gewerkOpts = '<option value="alle">Alle Gewerke</option>';
  for (var i = 0; i < GEWERK_LIST.length; i++) {
    var g = GEWERK_LIST[i];
    var sel = gewerkFilter === g.val ? ' selected' : '';
    gewerkOpts += '<option value="' + g.val + '"' + sel + '>' + g.ico + ' ' + g.val + '</option>';
  }

  return '<div style="display:flex;gap:10px;align-items:center;margin-bottom:22px;flex-wrap:wrap;">'
    + '<div style="position:relative;flex:1;min-width:200px;">'
    + '<span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;">🔍</span>'
    + '<input type="text" placeholder="Handwerker suchen..." value="' + (searchQuery || '') + '" '
    + 'oninput="applySearch(this.value)" '
    + 'style="width:100%;padding:10px 12px 10px 36px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;font-family:inherit;color:#0f172a;background:white;outline:none;box-sizing:border-box;" '
    + 'onfocus="this.style.borderColor=\'#2563eb\'" onblur="this.style.borderColor=\'#e2e8f0\'">'
    + '</div>'
    + '<select onchange="applyGewerkFilter(this.value)" '
    + 'style="padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;font-family:inherit;color:#0f172a;background:white;outline:none;cursor:pointer;" '
    + 'onfocus="this.style.borderColor=\'#2563eb\'" onblur="this.style.borderColor=\'#e2e8f0\'">'
    + gewerkOpts
    + '</select>'
    + '</div>';
}

// ─── BUILD CARDS GRID ─────────────────────────────────────
function buildCardsGrid(hws) {
  if (hws.length === 0) {
    return emptyState('🔧', 'Keine Handwerker gefunden',
      searchQuery || gewerkFilter !== 'alle'
        ? 'Kein Handwerker entspricht deinem Filter. Passe die Suche an.'
        : 'Füge deinen ersten Handwerker hinzu, um loszulegen.',
      searchQuery || gewerkFilter !== 'alle' ? '' : '+ Handwerker hinzufügen',
      'openNewModal()');
  }

  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;">';

  for (var x = 0; x < hws.length; x++) {
    var hw = hws[x];
    var initials = ((hw.vn || '').charAt(0) + (hw.nn || '').charAt(0)).toUpperCase();
    var color = avatarColor((hw.vn || '') + (hw.nn || ''));
    var fullName = (hw.vn || '') + ' ' + (hw.nn || '');
    var ico = gewerkIcon(hw.gewerk);
    var activeOrders = getActiveOrders(hw);
    var bew = parseInt(hw.bewertung) || 0;
    var tel = hw.tel || '';

    html += '<div style="background:white;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;flex-direction:column;">';

    // Color stripe
    html += '<div style="height:4px;background:' + color + ';"></div>';

    // Card header: avatar + name + status
    html += '<div style="padding:18px 18px 14px;display:flex;align-items:flex-start;gap:14px;">';
    html += '<div style="width:52px;height:52px;border-radius:13px;background:' + color + ';display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:white;flex-shrink:0;letter-spacing:-1px;">' + initials + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div style="font-size:15px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + fullName + '</div>';
    html += '<div style="font-size:12px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (hw.firma || '<em>Keine Firma</em>') + '</div>';
    html += '<div style="margin-top:7px;">' + statusBadge(hw.status) + '</div>';
    html += '</div>';
    html += '</div>';

    // Gewerk badge
    html += '<div style="padding:0 18px 12px;">';
    html += badge(ico + ' ' + (hw.gewerk || 'Sonstiges'), 'blue');
    html += '</div>';

    html += '<div style="height:1px;background:#f1f5f9;"></div>';

    // Info rows
    html += '<div style="padding:14px 18px;flex:1;">';

    // Telefon + WhatsApp
    if (tel) {
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;">';
      html += '<a href="tel:' + tel + '" style="font-size:13px;color:#0f172a;text-decoration:none;display:flex;align-items:center;gap:5px;" title="Anrufen">📞 <span>' + tel + '</span></a>';
      html += '<a href="' + waLink(tel) + '" target="_blank" style="background:#25D366;color:white;border-radius:7px;padding:4px 11px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;">WhatsApp</a>';
      html += '</div>';
    }

    // Bewertung
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
    html += '<span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.4px;">Bewertung</span>';
    html += '<span style="font-size:16px;color:#f59e0b;letter-spacing:1px;" title="' + bew + ' von 5">' + starRating(bew) + '</span>';
    html += '</div>';

    // Aktive Aufträge + Stundensatz
    html += '<div style="display:flex;gap:10px;margin-bottom:10px;">';
    html += '<div style="flex:1;background:#f8fafc;border-radius:8px;padding:8px 12px;">';
    html += '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.4px;">Aktive Aufträge</div>';
    html += '<div style="font-size:17px;font-weight:800;color:' + (activeOrders > 0 ? '#2563eb' : '#0f172a') + ';margin-top:1px;">' + activeOrders + '</div>';
    html += '</div>';
    if (hw.stundensatz) {
      html += '<div style="flex:1;background:#f8fafc;border-radius:8px;padding:8px 12px;">';
      html += '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.4px;">Stundensatz</div>';
      html += '<div style="font-size:17px;font-weight:800;color:#16a34a;margin-top:1px;">' + hw.stundensatz + ' €/h</div>';
      html += '</div>';
    }
    html += '</div>';

    html += '</div>';

    html += '<div style="height:1px;background:#f1f5f9;"></div>';

    // Action buttons
    html += '<div style="padding:12px 18px;display:flex;gap:8px;">';
    html += '<button onclick="openEditModal(\'' + hw.id + '\')" '
      + 'style="flex:1;padding:8px 0;border:1px solid #e2e8f0;border-radius:8px;background:white;color:#0f172a;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;" '
      + 'onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'white\'">✏️ Bearbeiten</button>';
    if (tel) {
      html += '<a href="tel:' + tel + '" '
        + 'style="flex:1;padding:8px 0;border:1px solid #dbeafe;border-radius:8px;background:#eff6ff;color:#2563eb;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;" '
        + 'onmouseover="this.style.background=\'#dbeafe\'" onmouseout="this.style.background=\'#eff6ff\'">📞 Anrufen</a>';
    }
    html += '<button onclick="deleteHW(\'' + hw.id + '\')" '
      + 'style="padding:8px 14px;border:1px solid #fee2e2;border-radius:8px;background:#fff5f5;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;" '
      + 'onmouseover="this.style.background=\'#fee2e2\'" onmouseout="this.style.background=\'#fff5f5\'">🗑️</button>';
    html += '</div>';

    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ─── MODAL HTML ───────────────────────────────────────────
function buildModal() {
  var gewerkOptsHtml = '';
  for (var i = 0; i < GEWERK_LIST.length; i++) {
    var g = GEWERK_LIST[i];
    gewerkOptsHtml += '<option value="' + g.val + '">' + g.ico + ' ' + g.val + '</option>';
  }

  var statusOptsHtml =
    '<option value="Verfügbar">Verfügbar</option>'
    + '<option value="Beschäftigt">Beschäftigt</option>'
    + '<option value="Nicht verfügbar">Nicht verfügbar</option>';

  var starsHtml = '<div id="modal-stars" style="display:flex;gap:6px;padding:4px 0;">';
  for (var s = 1; s <= 5; s++) {
    starsHtml += '<span onclick="updateModalStars(' + s + ')" '
      + 'onmouseover="hoverModalStar(' + s + ')" '
      + 'onmouseout="unhoverModalStar()" '
      + 'style="font-size:28px;cursor:pointer;color:' + (s <= 3 ? '#f59e0b' : '#d1d5db') + ';transition:color 0.1s;">★</span>';
  }
  starsHtml += '</div><input type="hidden" id="hw-bewertung" value="3">';

  var body =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    + formGroup('Vorname *', '<input id="hw-vn" ' + inputStyle + ' placeholder="Klaus">')
    + formGroup('Nachname *', '<input id="hw-nn" ' + inputStyle + ' placeholder="Müller">')
    + '</div>'
    + formGroup('Firma', '<input id="hw-firma" ' + inputStyle + ' placeholder="Müller GmbH">')
    + formGroup('Gewerk', '<select id="hw-gewerk" ' + inputStyle + '>' + gewerkOptsHtml + '</select>')
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    + formGroup('Telefon', '<input id="hw-tel" ' + inputStyle + ' placeholder="0151 555000">')
    + formGroup('E-Mail', '<input id="hw-email" type="email" ' + inputStyle + ' placeholder="info@firma.de">')
    + '</div>'
    + formGroup('Adresse', '<input id="hw-adresse" ' + inputStyle + ' placeholder="Musterstraße 1, 12345 Stadt">')
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    + formGroup('Stundensatz (€/h)', '<input id="hw-stundensatz" type="number" min="0" step="0.5" ' + inputStyle + ' placeholder="z.B. 75">')
    + formGroup('Status', '<select id="hw-status" ' + inputStyle + '>' + statusOptsHtml + '</select>')
    + '</div>'
    + formGroup('Bewertung (1–5)', starsHtml)
    + formGroup('Notizen', '<textarea id="hw-notizen" rows="3" ' + inputStyle + ' placeholder="Besondere Hinweise, Erfahrungen..."></textarea>')
    + formGroup('Zertifikate / Versicherungen', '<textarea id="hw-zertifikate" rows="3" ' + inputStyle + ' placeholder="z.B. Haftpflichtversicherung, Meisterbrief..."></textarea>')
    + '<div style="display:flex;gap:10px;margin-top:8px;">'
    + '<button onclick="saveHW()" style="flex:1;padding:12px;background:#2563eb;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;" onmouseover="this.style.background=\'#1d4ed8\'" onmouseout="this.style.background=\'#2563eb\'">💾 Speichern</button>'
    + '<button onclick="hideModal(\'hw-modal\')" style="padding:12px 20px;background:#f1f5f9;color:#64748b;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    + '</div>';

  return modalHTML('hw-modal', '<span id="hw-modal-title">Handwerker hinzufügen</span>', body);
}

// ─── MAIN RENDER ──────────────────────────────────────────
function render() {
  var kpis   = getKPIs();
  var hws    = filteredHW();

  var trialBanner = getTrialBanner();
  var kpiRow      = buildKPIRow(kpis);
  var filterBar   = buildFilterBar();
  var cardsGrid   = buildCardsGrid(hws);

  var mainContent = (trialBanner ? trialBanner : '') + kpiRow + filterBar + cardsGrid;

  var actionBtn = '<button onclick="openNewModal()" '
    + 'style="background:#2563eb;color:white;border:none;border-radius:9px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;" '
    + 'onmouseover="this.style.background=\'#1d4ed8\'" onmouseout="this.style.background=\'#2563eb\'">+ Handwerker hinzufügen</button>';

  var modals = buildModal();

  renderLayout('handwerker', '🔧 Handwerker', actionBtn, mainContent, modals);
}

// ─── BOOT ─────────────────────────────────────────────────
initFirebase();
startPageListener(user.uid, render);
</script>
</body>
</html>
