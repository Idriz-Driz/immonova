<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://nominatim.openstreetmap.org; frame-src 'none'; object-src 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – Zählerstände</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
<link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;padding:0;font-family:'DM Sans',sans-serif;background:#f8fafc;">
<script>
checkAuth(); checkTrial();
showDemoBanner();
showDemoBanner();
var user = getUser(); var uid = user.uid;
var editWohnung = null;
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;background:white;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor=\'#2563eb\'" onblur="this.style.borderColor=\'#e2e8f0\'';

var ZAEHLER_TYPEN = [
  { key: 'strom',      label: 'Strom',       unit: 'kWh', ico: '⚡' },
  { key: 'wasser_k',  label: 'Wasser kalt',  unit: 'm³',  ico: '💧' },
  { key: 'wasser_w',  label: 'Wasser warm',  unit: 'm³',  ico: '🌡️' },
  { key: 'gas',        label: 'Gas',          unit: 'm³',  ico: '🔥' }
];

function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl(t) { return '<label style="display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;">'+t+'</label>'; }
function fmtVal(v) {
  var n = parseFloat(v);
  if (isNaN(n) || v === '' || v === undefined || v === null) return '–';
  return n.toLocaleString('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function render() {
  var mieter = getData(KEYS.mieter, []);
  var zaehler = getData(KEYS.zaehler, {});
  var qQ = ((document.getElementById('f-q')||{}).value||'').toLowerCase();

  var filtered = mieter.filter(function(m) {
    if (qQ && !(m.name+m.wn+'').toLowerCase().includes(qQ)) return false;
    return true;
  });

  // KPIs
  var totalStrom = 0, totalWasser = 0, totalGas = 0;
  mieter.forEach(function(m) {
    var z = zaehler[m.wn] || {};
    totalStrom += parseFloat(z.strom_aktuell||0);
    totalWasser += parseFloat(z.wasser_k_aktuell||0) + parseFloat(z.wasser_w_aktuell||0);
    totalGas += parseFloat(z.gas_aktuell||0);
  });

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;">'
    +kpi('🏘️','Wohnungen',mieter.length,'')
    +kpi('⚡','Strom ges.',totalStrom.toLocaleString('de-DE',{maximumFractionDigits:1}),'kWh')
    +kpi('💧','Wasser ges.',(totalWasser).toLocaleString('de-DE',{maximumFractionDigits:1}),'m³')
    +kpi('🔥','Gas ges.',totalGas.toLocaleString('de-DE',{maximumFractionDigits:1}),'m³')
    +'</div>';

  var filterHtml = '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">'
    +'<input id="f-q" oninput="render()" value="'+esc(qQ)+'" placeholder="🔍 Mieter, Wohnung..." style="'+inputStyle+'max-width:240px;">'
    +'</div>';

  var cardsHtml = '';
  if (!filtered.length) {
    cardsHtml = emptyState('⚡','Keine Wohnungen','Lege zuerst Mieter an, um Zählerstände zu erfassen','Mieter anlegen','window.location.href=\'mieter.html\'');
  } else {
    cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;">';
    filtered.forEach(function(m) {
      var z = zaehler[m.wn] || {};
      cardsHtml += '<div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">'
        +'<div>'
        +'<div style="font-size:16px;font-weight:700;color:#0f172a;">'+esc(m.name||'–')+'</div>'
        +'<div style="font-size:12px;color:#64748b;">'+esc(m.wn||'Wohnung unbekannt')+'</div>'
        +'</div>'
        +'<button onclick="openRead(\''+esc(m.wn)+'\')" style="padding:7px 14px;border-radius:9px;border:none;background:#eff6ff;color:#2563eb;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">📝 Ablesen</button>'
        +'</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
        +ZAEHLER_TYPEN.map(function(t) {
          var aktuell = parseFloat(z[t.key+'_aktuell']||0);
          var vorjahr = parseFloat(z[t.key+'_vorjahr']||0);
          var diff = aktuell - vorjahr;
          var hasDiff = z[t.key+'_vorjahr'] !== undefined && z[t.key+'_vorjahr'] !== '';
          return '<div style="background:#f8fafc;border-radius:10px;padding:12px;">'
            +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">'
            +'<span style="font-size:16px;">'+t.ico+'</span>'
            +'<span style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">'+t.label+'</span>'
            +'</div>'
            +'<div style="font-size:20px;font-weight:800;color:#0f172a;">'+fmtVal(z[t.key+'_aktuell'])+'<span style="font-size:12px;font-weight:400;color:#94a3b8;"> '+t.unit+'</span></div>'
            +(hasDiff?'<div style="font-size:11px;color:'+(diff>0?'#dc2626':'#16a34a')+';">Δ '+(diff>0?'+':'')+diff.toLocaleString('de-DE',{maximumFractionDigits:1})+' '+t.unit+' vs. Vorjahr</div>':'<div style="font-size:11px;color:#94a3b8;">Kein Vorjahr</div>')
            +'<div style="font-size:10px;color:#94a3b8;margin-top:2px;">Vorjahr: '+fmtVal(z[t.key+'_vorjahr'])+' '+t.unit+'</div>'
            +(z[t.key+'_datum']?'<div style="font-size:10px;color:#94a3b8;">Abgelesen: '+fmtDate(z[t.key+'_datum'])+'</div>':'')
            +'</div>';
        }).join('')
        +'</div>'
        +(z.notiz?'<div style="margin-top:12px;font-size:12px;color:#64748b;background:#f8fafc;border-radius:8px;padding:8px;">📝 '+esc(z.notiz)+'</div>':'')
        +'</div>';
    });
    cardsHtml += '</div>';
  }

  var actionBtn = '<button onclick="openAddWohnung()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Manuell erfassen</button>';
  var main = '<div style="padding:24px;">'+getTrialBanner()+kpiHtml+filterHtml+cardsHtml+'</div>';
  renderLayout('zaehler','Zählerstände', actionBtn, main, buildReadModal(mieter)+buildManualModal());
}

function kpi(ico,l,v,s) {
  return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">'
    +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div>'
    +'<div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'
    +(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')
    +'</div>';
}

function buildReadModal(mieter) {
  return '<div id="read-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:480px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="read-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:4px;">Zähler ablesen</h3>'
    +'<div id="read-wohnung-label" style="font-size:13px;color:#64748b;margin-bottom:20px;"></div>'
    +ZAEHLER_TYPEN.map(function(t) {
      return '<div style="background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:12px;">'
        +'<div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;">'+t.ico+' '+t.label+' ('+t.unit+')</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
        +'<div>'+lbl('Aktuell')+'<input id="r-'+t.key+'-a" type="number" step="0.1" placeholder="0" style="'+inputStyle+'"></div>'
        +'<div>'+lbl('Vorjahr')+'<input id="r-'+t.key+'-v" type="number" step="0.1" placeholder="0" style="'+inputStyle+'"></div>'
        +'</div>'
        +'</div>';
    }).join('')
    +'<div style="margin-bottom:12px;">'+lbl('Ablesedatum')+'<input id="r-datum" type="date" style="'+inputStyle+'"></div>'
    +'<div style="margin-bottom:12px;">'+lbl('Notiz')+'<textarea id="r-notiz" style="'+inputStyle+'height:60px;resize:vertical;"></textarea></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeRead()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveRead()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function buildManualModal() {
  var body = formGroup('Wohnungsbezeichnung *', formInput('man-wn','text','z.B. EG Links / OG 2'), true)
    + modalFooter('manual-modal', 'Weiter →', 'startManual()');
  return '<div id="manual-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1001;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:16px;padding:28px;max-width:360px;width:100%;margin:20px;">'
    +'<div style="font-size:16px;font-weight:700;color:#0f172a;margin-bottom:20px;">Wohnung eingeben</div>'
    + body
    +'</div></div>';
}

function openRead(wn) {
  editWohnung = wn;
  var z = getData(KEYS.zaehler, {})[wn] || {};
  document.getElementById('read-title').textContent = 'Zähler ablesen';
  document.getElementById('read-wohnung-label').textContent = wn;
  ZAEHLER_TYPEN.forEach(function(t) {
    document.getElementById('r-'+t.key+'-a').value = z[t.key+'_aktuell']||'';
    document.getElementById('r-'+t.key+'-v').value = z[t.key+'_vorjahr']||'';
  });
  document.getElementById('r-datum').value = z.datum || today();
  document.getElementById('r-notiz').value = z.notiz||'';
  document.getElementById('read-modal').style.display = 'flex';
}

function openAddWohnung() { if (checkDemoBlock()) return; showModal('manual-modal'); document.getElementById('man-wn').value=''; }
function closeManual() { hideModal('manual-modal'); }
function startManual() {
  var wn = document.getElementById('man-wn').value.trim();
  if (!wn) { toast('Bitte Wohnung eingeben.', 'error'); return; }
  closeManual();
  openRead(wn);
}

function closeRead() { document.getElementById('read-modal').style.display='none'; }

function saveRead() {
  if (!editWohnung) return;
  var all = getData(KEYS.zaehler, {});
  var obj = { datum: document.getElementById('r-datum').value, notiz: document.getElementById('r-notiz').value.trim() };
  ZAEHLER_TYPEN.forEach(function(t) {
    obj[t.key+'_aktuell'] = document.getElementById('r-'+t.key+'-a').value;
    obj[t.key+'_vorjahr'] = document.getElementById('r-'+t.key+'-v').value;
  });
  all[editWohnung] = obj;
  setData(KEYS.zaehler, all);
  var _uid = getCurrentUid();
  if (_uid && _uid !== 'demo') { saveCollection(_uid, 'zaehler', [all]).catch(function(){}); }
  syncToFirebase(uid); closeRead(); render();
}

initFirebase();
loadFromFirebase(uid, function(){
  (async function() {
    var _uid = getCurrentUid();
    if (_uid && _uid !== 'demo') {
      var remote = await loadCollection(_uid, 'zaehler', null);
      if (remote && remote.length > 0) setData(KEYS.zaehler, remote[0]);
      else {
        var local = getData(KEYS.zaehler, {});
        if (Object.keys(local).length > 0) saveCollection(_uid, 'zaehler', [local]).catch(function(){});
      }
    }
    render();
  })();
});
</script>
</body>
</html>
