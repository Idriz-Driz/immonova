function getMieter() {
  return getData(KEYS.mieter, DEFAULT_MIETER);
}

function openPreview(id) {
  var vorlage = null;
  for(var i=0;i<VORLAGEN.length;i++){ if(VORLAGEN[i].id===id){ vorlage=VORLAGEN[i]; break; } }
  if(!vorlage) return;
  currentVorlage = vorlage;

  document.getElementById('prev-title').textContent = vorlage.ico+' '+vorlage.name;
  document.getElementById('prev-text').textContent = vorlage.text;

  var mieter = getMieter();
  var sel = document.getElementById('prev-mieter');
  sel.innerHTML = '<option value="">– Kein Mieter ausgewählt –</option>';
  for(var m=0;m<mieter.length;m++){
    sel.innerHTML += '<option value="'+m+'">'+mieter[m].name+' ('+mieter[m].wn+')</option>';
  }
  fillPlaceholders();
  showModal('prev-modal');
}

function fillPlaceholders() {
  if(!currentVorlage) return;
  var mieter = getMieter();
  var sel = document.getElementById('prev-mieter');
  var idx = sel.value;
  var m = idx !== '' ? mieter[parseInt(idx)] : null;

  var text = currentVorlage.text;
  text = text.replace(/\[MIETER\]/g, m ? m.name : '[MIETER]');
  text = text.replace(/\[WOHNUNG\]/g, m ? m.wn : '[WOHNUNG]');
  text = text.replace(/\[BETRAG\]/g, m ? fmt(m.miete) : '[BETRAG]');
  text = text.replace(/\[DATUM\]/g, fmtDate(today()));
  text = text.replace(/\[FLAECHE\]/g, '65');
  text = text.replace(/\[VERMIETER\]/g, getUser().name);

  document.getElementById('prev-text').textContent = text;
}

function doPrint() {
  var content = document.getElementById('prev-text').textContent;
  var printWin = window.open('', '_blank', 'width=800,height=600');
  printWin.document.write(
    '<!DOCTYPE html><html lang="de"><head>'
    + '<meta charset="UTF-8">'
    + '<title>'+currentVorlage.name+' – ImmoNova</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">'
    + '<style>'
    + 'body{font-family:"DM Sans",sans-serif;padding:40px;color:#0f172a;line-height:1.7;font-size:14px;}'
    + 'pre{white-space:pre-wrap;font-family:"DM Sans",sans-serif;font-size:14px;line-height:1.7;}'
    + 'h1{font-size:20px;font-weight:700;margin-bottom:24px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:12px;}'
    + '.logo{font-size:13px;color:#94a3b8;margin-bottom:20px;}'
    + '</style>'
    + '</head><body>'
    + '<div class="logo">ImmoNova – Immobilienverwaltung</div>'
    + '<pre>'+content+'</pre>'
    + '</body></html>'
  );
  printWin.document.close();
  printWin.focus();
  printWin.print();
}

function buildGrid() {
  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;">';
  for(var i=0;i<VORLAGEN.length;i++){
    var v = VORLAGEN[i];
    html += '<div style="background:white;border:2px solid #e2e8f0;border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;" '
      + 'onmouseover="this.style.borderColor=\''+v.farbe+'\';this.style.boxShadow=\'0 4px 20px rgba(0,0,0,0.1)\';this.style.transform=\'translateY(-2px)\'" '
      + 'onmouseout="this.style.borderColor=\'#e2e8f0\';this.style.boxShadow=\'none\';this.style.transform=\'none\'" '
      + 'onclick="openPreview(\''+v.id+'\')">';
    // Decorative top strip
    html += '<div style="position:absolute;top:0;left:0;right:0;height:4px;background:'+v.farbe+';"></div>';
    // Icon
    html += '<div style="font-size:44px;margin-bottom:12px;margin-top:4px;">'+v.ico+'</div>';
    // Name
    html += '<div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:6px;">'+v.name+'</div>';
    // Description
    html += '<div style="font-size:12px;color:#64748b;line-height:1.5;margin-bottom:16px;">'+v.beschr+'</div>';
    // Button
    html += '<button onclick="event.stopPropagation();openPreview(\''+v.id+'\')" style="width:100%;padding:9px;background:'+v.farbe+';color:white;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Erstellen</button>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function render() {
  var mieter = getMieter();
  var mieterOptsHtml = '<option value="">– Kein Mieter ausgewählt –</option>';
  for(var m=0;m<mieter.length;m++){
    mieterOptsHtml += '<option value="'+m+'">'+mieter[m].name+' ('+mieter[m].wn+')</option>';
  }

  var previewModalContent =
    '<div style="margin-bottom:16px;">'
    + formGroup('Mieterdaten einsetzen', '<select id="prev-mieter" onchange="fillPlaceholders()" '+inputStyle+'>'+ mieterOptsHtml +'</select>')
    + '</div>'
    + '<div id="print-area" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:20px;max-height:380px;overflow-y:auto;margin-bottom:18px;">'
    + '<pre id="prev-text" style="white-space:pre-wrap;font-family:\'DM Sans\',sans-serif;font-size:13px;line-height:1.7;color:#0f172a;margin:0;"></pre>'
    + '</div>'
    + '<div style="display:flex;gap:10px;">'
    + '<button onclick="doPrint()" style="flex:1;padding:12px;background:#0f172a;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">🖨️ Drucken</button>'
    + '<button onclick="hideModal(\'prev-modal\')" style="padding:12px 20px;background:#f1f5f9;color:#64748b;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    + '</div>';

  // Build preview modal with dynamic title span
  var previewModal = '<div id="prev-modal" onclick="if(event.target===this)this.style.display=\'none\'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px);">'
    + '<div style="background:white;border-radius:16px;padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">'
    + '<div id="prev-title" style="font-size:16px;font-weight:700;"></div>'
    + '<button onclick="hideModal(\'prev-modal\')" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;">✕</button>'
    + '</div>'
    + previewModalContent
    + '</div></div>';

  // Intro header
  var header = '<div style="background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;padding:28px;margin-bottom:28px;color:white;">'
    + '<div style="font-size:32px;margin-bottom:8px;">📄</div>'
    + '<div style="font-size:20px;font-weight:700;margin-bottom:6px;">Dokumente & Vorlagen</div>'
    + '<div style="font-size:14px;color:#94a3b8;">'+VORLAGEN.length+' professionelle Vorlagen für die Immobilienverwaltung – direkt ausfüllen und drucken.</div>'
    + '</div>';

  var mainHTML = header + buildGrid();

  renderLayout('dokumente', '📄 Dokumente & Vorlagen', '', mainHTML, previewModal);
}

initFirebase();
loadFromFirebase(user.uid, render);
</script>
