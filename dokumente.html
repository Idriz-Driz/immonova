<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – Dokumente</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body>
<script>
checkAuth(); checkTrial();
var user = getUser(); var uid = user.uid;
var appData = {}; var editId = null; var activeTab = 'dokumente'; var activeFolder = '';
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;outline:none;box-sizing:border-box;';
var KATEGORIEN = ['Mietverträge','Übergabeprotokolle','Abrechnungen','Korrespondenz','Grundrisse','Sonstiges'];
var TYPEN = {PDF:'📄',Excel:'📊',Word:'📝',Bild:'🖼️',Sonstiges:'📁'};
var VORLAGEN = [
  {name:'Mietvertrag (Standard)',desc:'Vollständiger Mietvertrag für Wohnraum'},
  {name:'Übergabeprotokoll',desc:'Wohnungsübergabe bei Ein- und Auszug'},
  {name:'Nebenkostenabrechnung',desc:'Jährliche Betriebskostenabrechnung'},
  {name:'Mieterhöhungsschreiben',desc:'Ankündigung einer Mieterhöhung'},
  {name:'Kündigung durch Vermieter',desc:'Ordentliche Kündigung des Mietvertrags'},
  {name:'Kündigung durch Mieter',desc:'Vorlage für Mieter-Kündigung'},
  {name:'Mahnung (1. Stufe)',desc:'Erste freundliche Zahlungserinnerung'},
  {name:'Mahnung (2. Stufe)',desc:'Letzte Mahnung vor weiteren Schritten'},
  {name:'Hausordnung',desc:'Standard-Hausordnung für Mietobjekte'},
  {name:'Vollmacht',desc:'Allgemeine Vollmacht für Verwaltungsaufgaben'}
];
function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl() { return 'display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;'; }
function fg(label,id,type,ph) { return '<div style="margin-bottom:12px;"><label style="'+lbl()+'">'+label+'</label><input id="'+id+'" type="'+type+'" placeholder="'+ph+'" style="'+inputStyle+'"></div>'; }
function fmtDate(d) { if(!d) return '–'; var x=new Date(d); return isNaN(x)?d:x.toLocaleDateString('de-DE'); }

function render() {
  var docs = appData.dokumente || [];
  var qQ = ((document.getElementById('f-q')||{}).value||'').toLowerCase();
  var qKat = (document.getElementById('f-kat')||{}).value||'';

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;">'
    +kpi('📁','Gesamt Dokumente',docs.length,'')
    +kpi('📄','Vorlagen',VORLAGEN.length,'Bereit zur Verwendung')
    +kpi('🕐','Zuletzt hinzugefügt',docs.length?fmtDate(docs[0].datum):'–','')
    +'</div>';

  var tabsHtml = '<div style="display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:20px;gap:3px;">'
    +'<button onclick="switchTab(\'dokumente\')" style="flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'+(activeTab==='dokumente'?'background:white;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,0.1);':'background:none;color:#94a3b8;')+'">📁 Meine Dokumente</button>'
    +'<button onclick="switchTab(\'vorlagen\')" style="flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'+(activeTab==='vorlagen'?'background:white;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,0.1);':'background:none;color:#94a3b8;')+'">📝 Vorlagen</button>'
    +'</div>';

  var content = '';
  if (activeTab === 'dokumente') {
    var filterHtml = '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">'
      +'<input id="f-q" oninput="render()" value="'+esc(qQ)+'" placeholder="🔍 Dokument suchen..." style="'+inputStyle+'max-width:220px;">'
      +'<select id="f-kat" onchange="render()" style="'+inputStyle+'max-width:180px;"><option value="">Alle Kategorien</option>'+KATEGORIEN.map(function(k){ return '<option value="'+k+'"'+(qKat===k?' selected':'')+'>'+k+'</option>'; }).join('')+'</select>'
      +'</div>';

    // Folder view
    var folderHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;">';
    KATEGORIEN.forEach(function(kat) {
      var cnt = docs.filter(function(d){ return d.kategorie===kat; }).length;
      var isActive = activeFolder === kat;
      folderHtml += '<div onclick="setFolder(\''+kat+'\')" style="background:'+(isActive?'#eff6ff':' white')+';border:2px solid '+(isActive?'#2563eb':'#e2e8f0')+';border-radius:14px;padding:16px 12px;cursor:pointer;text-align:center;transition:all 0.15s;">'
        +'<div style="font-size:32px;margin-bottom:8px;">📁</div>'
        +'<div style="font-size:12px;font-weight:700;color:'+(isActive?'#2563eb':'#0f172a')+';">'+esc(kat)+'</div>'
        +'<div style="font-size:11px;color:#94a3b8;margin-top:2px;">'+cnt+' Dokument'+(cnt!==1?'e':'')+'</div>'
        +'</div>';
    });
    folderHtml += '</div>';

    var filtered = docs.filter(function(d){
      if (activeFolder && d.kategorie!==activeFolder) return false;
      if (qKat && d.kategorie!==qKat) return false;
      if (qQ && !(d.name+d.kategorie+d.objekt+'').toLowerCase().includes(qQ)) return false;
      return true;
    });

    var listHtml = '';
    if (!filtered.length && !activeFolder) {
      listHtml = emptyState('📁','Keine Dokumente','Füge dein erstes Dokument hinzu','+ Dokument hinzufügen','openAdd()');
    } else if (!filtered.length) {
      listHtml = '<div style="text-align:center;padding:32px;color:#94a3b8;font-size:14px;">Keine Dokumente in dieser Kategorie</div>';
    } else {
      listHtml = '<div style="background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);">'
        +'<div style="padding:12px 16px;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:1fr auto auto auto auto;gap:12px;align-items:center;">'
        +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Dateiname</div>'
        +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Kategorie</div>'
        +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Datum</div>'
        +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Typ</div>'
        +'<div></div></div>';
      filtered.forEach(function(d) {
        var ico = TYPEN[d.dateityp]||'📁';
        listHtml += '<div style="padding:12px 16px;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:1fr auto auto auto auto;gap:12px;align-items:center;">'
          +'<div style="display:flex;align-items:center;gap:10px;"><span style="font-size:20px;">'+ico+'</span><div>'
          +'<div style="font-size:14px;font-weight:600;color:#0f172a;">'+esc(d.name)+'</div>'
          +'<div style="font-size:12px;color:#94a3b8;">'+esc(d.objekt||'')+'</div></div></div>'
          +'<span style="background:#f1f5f9;color:#475569;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;">'+esc(d.kategorie)+'</span>'
          +'<div style="font-size:12px;color:#64748b;white-space:nowrap;">'+fmtDate(d.datum)+'</div>'
          +'<span style="background:#eff6ff;color:#2563eb;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;">'+esc(d.dateityp||'PDF')+'</span>'
          +'<div style="display:flex;gap:4px;">'
          +'<button onclick="alert(\'Vorschau kommt bald\')" style="width:28px;height:28px;border-radius:7px;border:none;background:#f8fafc;color:#475569;cursor:pointer;font-size:12px;">👁️</button>'
          +'<button onclick="openEditDoc(\''+d.id+'\')" style="width:28px;height:28px;border-radius:7px;border:none;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:12px;">✏️</button>'
          +'<button onclick="deleteDoc(\''+d.id+'\')" style="width:28px;height:28px;border-radius:7px;border:none;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:12px;">🗑️</button>'
          +'</div></div>';
      });
      listHtml += '</div>';
    }
    content = filterHtml+folderHtml+listHtml;

  } else {
    content = '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#d97706;">📎 Datei-Upload wird bald verfügbar sein. Vorlagen können als Metadaten verwaltet werden.</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;">';
    VORLAGEN.forEach(function(v,i) {
      content += '<div style="background:white;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">'
        +'<div style="font-size:28px;margin-bottom:10px;">📄</div>'
        +'<div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:4px;">'+esc(v.name)+'</div>'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:14px;">'+esc(v.desc)+'</div>'
        +'<button onclick="alert(\'Vorlage wird vorbereitet...\')" style="width:100%;padding:9px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Vorlage verwenden</button>'
        +'</div>';
    });
    content += '</div>';
  }

  var actionBtn = '<button onclick="openAdd()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Dokument hinzufügen</button>';
  var main = '<div style="padding:24px;">'+getTrialBanner()+kpiHtml+tabsHtml+content+'</div>';
  document.body.innerHTML = renderLayout('dokumente','Dokumente',actionBtn,main,buildModal());
}

function kpi(ico,l,v,s) { return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);"><div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div><div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'+(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')+'</div>'; }
function switchTab(t) { activeTab=t; render(); }
function setFolder(f) { activeFolder = activeFolder===f?'':f; render(); }

function buildModal() {
  return '<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:460px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="m-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Dokument hinzufügen</h3>'
    +'<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:#d97706;">📎 Datei-Upload kommt bald – füge zunächst Metadaten hinzu.</div>'
    +fg('Dateiname','d-name','text','z.B. Mietvertrag_Mustermann.pdf')
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Kategorie</label><select id="d-kat" style="'+inputStyle+'">'+KATEGORIEN.map(function(k){ return '<option>'+k+'</option>'; }).join('')+'</select></div>'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Dateityp</label><select id="d-typ" style="'+inputStyle+'">'+Object.keys(TYPEN).map(function(t){ return '<option>'+t+'</option>'; }).join('')+'</select></div>'
    +fg('Objekt','d-obj','text','Musterstr. 1')
    +fg('Datum','d-datum','date','')
    +fg('Notizen','d-notizen','text','')
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeAdd()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveDoc()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function openAdd() { editId=null; document.getElementById('m-title').textContent='Dokument hinzufügen'; ['d-name','d-obj','d-datum','d-notizen'].forEach(function(i){document.getElementById(i).value='';}); document.getElementById('d-datum').value=new Date().toISOString().slice(0,10); document.getElementById('add-modal').style.display='flex'; }
function openEditDoc(id) {
  var d=(appData.dokumente||[]).find(function(x){return x.id===id;}); if(!d) return; editId=id;
  document.getElementById('m-title').textContent='Dokument bearbeiten';
  document.getElementById('d-name').value=d.name||''; document.getElementById('d-kat').value=d.kategorie||'Sonstiges'; document.getElementById('d-typ').value=d.dateityp||'PDF'; document.getElementById('d-obj').value=d.objekt||''; document.getElementById('d-datum').value=d.datum||''; document.getElementById('d-notizen').value=d.notizen||'';
  document.getElementById('add-modal').style.display='flex';
}
function closeAdd() { document.getElementById('add-modal').style.display='none'; }
function saveDoc() {
  var name=document.getElementById('d-name').value.trim(); if(!name){alert('Bitte Dateiname eingeben.');return;}
  var docs=appData.dokumente||[];
  var obj={id:editId||gid(),name:name,kategorie:document.getElementById('d-kat').value,dateityp:document.getElementById('d-typ').value,objekt:document.getElementById('d-obj').value.trim(),datum:document.getElementById('d-datum').value,notizen:document.getElementById('d-notizen').value.trim()};
  if(editId){var idx=docs.findIndex(function(x){return x.id===editId;}); if(idx>=0) docs[idx]=obj;}else docs.unshift(obj);
  appData.dokumente=docs; syncToFirebase(uid); closeAdd(); render();
}
function deleteDoc(id) { if(!confirm('Dokument löschen?')) return; appData.dokumente=(appData.dokumente||[]).filter(function(x){return x.id!==id;}); syncToFirebase(uid); render(); }

initFirebase();
loadFromFirebase(uid, function(d) { if(d) appData=d; if(!appData.dokumente) appData.dokumente=[]; render(); });
</script>
</body>
</html>
