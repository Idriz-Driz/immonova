    html: function(d) {
      var m = d.mieter || {};
      var jahr = d.jahr || new Date().getFullYear()-1;
      var monatNK = parseFloat(m.nk||d.nk||'0');

      // Anteil des Mieters (Jahres-NK nach Kostenart aufteilen)
      // Typische deutsche NK-Verteilung: Heizung 35%, Wasser 20%, Hausmeister 15%, Müll 10%, Versicherung 10%, Grundsteuer 10%
      var alleMieter = getData(KEYS.mieter, []);
      var anzahlMieter = Math.max(1, alleMieter.filter(function(x){ return x && x.name; }).length);
      var katAnteile = [
        { name: 'Grundsteuer',          pct: 0.10 },
        { name: 'Wasser/Abwasser',      pct: 0.20 },
        { name: 'Heizung',              pct: 0.35 },
        { name: 'Müllentsorgung',       pct: 0.10 },
        { name: 'Hausmeister/Reinigung',pct: 0.15 },
        { name: 'Versicherungen',       pct: 0.10 }
      ];
      var anteilGesamt = 0;
      var rows = katAnteile.map(function(k) {
        var anteil = gezahlt * k.pct;
        var gesamt = anteil * anzahlMieter;
        anteilGesamt += anteil;
        return '<tr style="border-bottom:1px solid #e2e8f0;">'
          +'<td style="padding:10px;">'+k.name+'</td>'
          +'<td style="text-align:right;padding:10px;">'+(gesamt>0?gesamt.toFixed(2)+' €':'0,00 €')+'</td>'
          +'<td style="text-align:right;padding:10px;">'+(anteil>0?anteil.toFixed(2)+' €':'0,00 €')+'</td>'
          +'</tr>';
      }).join('');
      var ergebnis = anteilGesamt - gezahlt;
      var ergebnisBg = ergebnis > 0 ? '#fef2f2' : '#f0fdf4';
      var ergebnisText = ergebnis > 0
        ? 'Nachzahlung: +' + ergebnis.toFixed(2) + ' €'
        : ergebnis < 0
          ? 'Guthaben: ' + ergebnis.toFixed(2) + ' €'
          : 'Ausgeglichen: 0,00 €';

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var cats = ['Alle','Verträge','Briefe','Mahnwesen','Finanzen','Übergabe','Aufträge'];

function render() {
  var qCat = ((document.getElementById('f-cat')||{}).value)||'Alle';
  var qQ = ((document.getElementById('f-q')||{}).value||'').toLowerCase();
  var mieter = getData(KEYS.mieter, []);
  var firstMieter = mieter[0] || {};

  var filtered = TEMPLATES.filter(function(t) {
    if (qCat !== 'Alle' && t.kat !== qCat) return false;
    if (qQ && !(t.titel+t.kat+t.desc+'').toLowerCase().includes(qQ)) return false;
    return true;
  });

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;">'
    +kpi('📄','Vorlagen',TEMPLATES.length,'')
    +kpi('👥','Mieter',mieter.length,'für Auto-Ausfüllung')
    +kpi('📁','Kategorien',cats.length-1,'')
    +'</div>';

  var filterHtml = '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">'
    +'<input id="f-q" oninput="render()" value="'+esc(qQ)+'" placeholder="🔍 Vorlage suchen..." style="'+inputStyle+'max-width:220px;">'
    +'<select id="f-cat" onchange="render()" style="'+inputStyle+'max-width:180px;">'
    +cats.map(function(c){ return '<option value="'+c+'"'+(qCat===c?' selected':'')+'>'+c+'</option>'; }).join('')
    +'</select>'
    +'</div>';

  var cardsHtml = '';
  if (!filtered.length) {
    cardsHtml = emptyState('📄','Keine Vorlagen','Keine Vorlagen gefunden','','');
  } else {
    cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">';
    filtered.forEach(function(t) {
      cardsHtml += '<div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;flex-direction:column;">'
        +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">'
        +'<span style="font-size:28px;">'+t.ico+'</span>'
        +'<div>'
        +'<div style="font-size:15px;font-weight:700;color:#0f172a;">'+esc(t.titel)+'</div>'
        +'<div style="font-size:11px;background:#eff6ff;color:#2563eb;padding:2px 8px;border-radius:20px;display:inline-block;font-weight:600;">'+esc(t.kat)+'</div>'
        +'</div>'
        +'</div>'
        +'<p style="font-size:12px;color:#64748b;flex:1;line-height:1.5;margin-bottom:14px;">'+esc(t.desc)+'</p>'
        +'<div style="display:flex;gap:6px;">'
        +'<button onclick="previewDoc(\''+t.id+'\')" style="flex:1;padding:8px;border-radius:8px;border:none;background:#f1f5f9;color:#475569;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">👁️ Vorschau</button>'
        +'<button onclick="printDoc(\''+t.id+'\')" style="flex:1;padding:8px;border-radius:8px;border:none;background:#2563eb;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">📄 Als PDF</button>'
        +'</div></div>';
    });
    cardsHtml += '</div>';
  }

  var actionBtn = '';
  var main = '<div style="padding:24px;">'+getTrialBanner()+kpiHtml+filterHtml+cardsHtml+'</div>';
  renderLayout('dokumente','Dokumente & Vorlagen', actionBtn, main, buildPreviewModal());
}

function kpi(ico,l,v,s) {
  return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">'
    +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div>'
    +'<div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'
    +(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')
    +'</div>';
}

function buildPreviewModal() {
  var mieter = getData(KEYS.mieter, []);
  var mieterOpts = mieter.length
    ? mieter.map(function(m, i) {
        return '<option value="'+i+'">'+(m.name||'Mieter '+(i+1))+' – '+(m.wn||'')+'</option>';
      }).join('')
    : '<option value="0">Kein Mieter vorhanden</option>';

  return '<div id="preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;">'
    +'<div style="background:white;border-radius:20px;max-width:780px;width:100%;margin:auto;">'
    +'<div style="padding:18px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">'
    +'<div id="preview-titlebar" style="font-size:16px;font-weight:700;color:#0f172a;"></div>'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
    +'<select id="preview-mieter-sel" onchange="refreshPreview()" style="padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;color:#0f172a;outline:none;background:white;">'
    +mieterOpts+'</select>'
    +'<button id="preview-print-btn" style="padding:8px 16px;border-radius:8px;border:none;background:#2563eb;color:white;font-size:12px;font-weight:700;cursor:pointer;">📄 Als PDF</button>'
    +'<button onclick="closePreview()" style="width:32px;height:32px;border-radius:8px;border:none;background:#f1f5f9;color:#64748b;cursor:pointer;font-size:16px;">✕</button>'
    +'</div>'
    +'</div>'
    +'<div id="preview-content" style="padding:32px 40px;font-family:Georgia,serif;font-size:14px;line-height:1.7;color:#1e293b;"></div>'
    +'</div></div>';
}

var _previewId = null;
function getDocData(id) {
  var mieter = getData(KEYS.mieter, []);
  var selEl  = document.getElementById('preview-mieter-sel');
  var idx    = selEl ? parseInt(selEl.value) || 0 : 0;
  var m      = mieter[idx] || mieter[0] || {};
  return {
    mieter:   m,
    name:     m.name     || 'Max Mustermann',
    wn:       m.wn       || 'EG Links',
    jahr:     new Date().getFullYear() - 1,
    kaltmiete: m.miete   || '800',
    nebenkosten: m.nebenkosten || '150',
    beginn:   m.mietbeginn || new Date().toLocaleDateString('de-DE'),
    kaution:  m.kaution  || (parseFloat(m.miete||800)*3).toString(),
    hw:       '',
    leistung: '',
    neuemiete: m.miete   || '850',
    betrag:   m.miete    || '800',
    grund:    '',
    kuendigung: '',
    wohnungsuebergabe: m.wn || 'EG Links'
  };
}

function refreshPreview() {
  if (!_previewId) return;
  var tmpl = TEMPLATES.find(function(t){ return t.id===_previewId; });
  if (!tmpl) return;
  document.getElementById('preview-content').innerHTML = tmpl.html(getDocData(_previewId));
}

function previewDoc(id) {
  _previewId = id;
  var tmpl = TEMPLATES.find(function(t){ return t.id===id; });
  if (!tmpl) return;
  document.getElementById('preview-titlebar').textContent = tmpl.ico+' '+tmpl.titel;
  document.getElementById('preview-content').innerHTML = tmpl.html(getDocData(id));
  document.getElementById('preview-print-btn').onclick = function(){ printDoc(id); };
  document.getElementById('preview-modal').style.display = 'flex';
}

function closePreview() { document.getElementById('preview-modal').style.display='none'; _previewId=null; }

function printDoc(id) {
  var tmpl = TEMPLATES.find(function(t){ return t.id===id; });
  if (!tmpl) return;
  var d = getDocData(id);
  var firma    = localStorage.getItem('in_firma_name') || (user && user.firma) || 'ImmoNova';
  var firmaAdr = [
    localStorage.getItem('in_firma_adr') || '',
    ((localStorage.getItem('in_firma_plz')||'') + ' ' + (localStorage.getItem('in_firma_stadt')||'')).trim()

  var heute      = new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });

  var win = window.open('', '_blank');

  win.document.write('<!DOCTYPE html><html lang="de"><head>'
    + '<meta charset="UTF-8">'
    + '<title>' + tmpl.titel + ' – ImmoNova</title>'

    // ── Reset & base ──
    + '*{box-sizing:border-box;margin:0;padding:0;}'

    +   'font-family:"DM Sans",Arial,sans-serif;font-size:12pt;line-height:1.6;'

    + '}'
    // ── Typography ──
    + 'h2{font-size:16pt;font-weight:700;color:#0f172a;margin:18px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:6px;}'
    + 'h3{font-size:13pt;font-weight:600;color:#0f172a;margin:14px 0 6px;}'
    + 'p{margin:6px 0;}'
    + 'ul,ol{margin:6px 0 6px 22px;}'
    + 'li{margin:3px 0;}'
    // ── Tables ──
    + 'table{width:100%;border-collapse:collapse;margin:12px 0;font-size:11pt;}'
    + 'th,td{border:1px solid #cbd5e1;padding:8px 11px;text-align:left;}'
    + 'th{background:#f1f5f9;font-weight:700;color:#374151;}'
    + 'tr:nth-child(even) td{background:#f8fafc;}'
    // ── Header ──
    + '.doc-header{'
    +   'display:flex;justify-content:space-between;align-items:flex-start;'
    +   'margin-bottom:28px;padding-bottom:16px;'
    +   'border-bottom:3px solid #2563eb;'
    + '}'
    + '.doc-firma-name{font-size:15pt;font-weight:800;color:#0f172a;margin-bottom:3px;}'
    + '.doc-firma-meta{font-size:9pt;color:#64748b;line-height:1.4;}'

    + '.doc-logo-text{font-size:20pt;font-weight:800;color:#2563eb;letter-spacing:-1px;}'
    + '.doc-logo-sub{font-size:8pt;color:#94a3b8;margin-top:1px;}'
    // ── Save button (only visible on screen, not in print) ──
    + '.save-btn{'
    +   'display:block;margin:0 auto 24px;padding:12px 28px;'
    +   'background:#2563eb;color:white;border:none;border-radius:9px;'
    +   'font-size:13pt;font-weight:700;cursor:pointer;font-family:inherit;'
    + '}'
    // ── Footer ──
    + '.doc-footer{margin-top:48px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:8pt;color:#94a3b8;display:flex;justify-content:space-between;}'
    // ── Print-specific rules ──
    + '@media print{'
    +   'body{padding:0;max-width:100%;}'
    +   '.save-btn,.no-print{display:none!important;}'
    +   '@page{size:A4;margin:20mm 18mm;}'
    +   'h2{page-break-after:avoid;}'
    +   'table{page-break-inside:avoid;}'
    + '}'
    + '</style>'
    + '</head><body>'

    // ── Save as PDF button (screen only) ──
    + '<button class="save-btn" onclick="window.print()">📄 Als PDF speichern / Drucken</button>'

    // ── Letterhead ──
    + '<div class="doc-header">'
    +   '<div>'
    +     '<div class="doc-firma-name">' + firma + '</div>'
    +     '<div class="doc-firma-meta">'
    +       (firmaAdr ? firmaAdr + '<br>' : '')
    +       (firmaEmail ? firmaEmail : '')
    +     '</div>'
    +   '</div>'

    +     '<div class="doc-logo-text">🏠 ImmoNova</div>'
    +     '<div class="doc-logo-sub">Immobilienverwaltung</div>'

    + '</div>'

  win.document.write(tmpl.html(d));

    + '</div>'

  );
  win.document.close();
  setTimeout(function(){ win.print(); }, 600);
}

initFirebase();
loadFromFirebase(uid, function(){ render(); });
