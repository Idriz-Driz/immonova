<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – Reinigung</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
<link rel="manifest" href="manifest.json">
</head>
<body style="margin:0;padding:0;font-family:'DM Sans',sans-serif;background:#f8fafc;">
<script>
checkAuth(); checkTrial();
var user = getUser(); var uid = user.uid;
var editId = null;
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;background:white;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor=\'#2563eb\'" onblur="this.style.borderColor=\'#e2e8f0\'';

var BEREICHE = ['Treppenhaus','Keller','Hof/Garten','Tiefgarage','Dachboden','Gemeinschaftsraum','Müllbereich','Briefkastenanlage'];

function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl(t) { return '<label style="display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;">'+t+'</label>'; }

function calcStatus(von, bis) {
  if (!von || !bis) return 'Geplant';
  var now = today();
  if (now < von) return 'Geplant';
  if (now > bis) return 'Abgeschlossen';
  return 'Aktiv';
}

function statusBadge(st) {
  var map = { Aktiv: '#16a34a', Geplant: '#2563eb', Abgeschlossen: '#64748b' };
  var col = map[st] || '#64748b';
  return '<span style="background:'+col+'20;color:'+col+';font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;">'+st+'</span>';
}

function render() {
  var list = getData(KEYS.reinigungen, []);
  var mieter = getData(KEYS.mieter, []);
  var qQ = ((document.getElementById('f-q')||{}).value||'').toLowerCase();
  var qSt = (document.getElementById('f-st')||{}).value||'';

  var enriched = list.map(function(r) {
    var st = calcStatus(r.von, r.bis);
    return Object.assign({}, r, { _status: st });
  });

  var filtered = enriched.filter(function(r) {
    if (qSt && r._status !== qSt) return false;
    if (qQ && !(r.mieter+r.bereich+'').toLowerCase().includes(qQ)) return false;
    return true;
  });

  var aktiv = enriched.filter(function(r){ return r._status==='Aktiv'; }).length;
  var geplant = enriched.filter(function(r){ return r._status==='Geplant'; }).length;
  var abgeschl = enriched.filter(function(r){ return r._status==='Abgeschlossen'; }).length;

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;">'
    +kpi('🧹','Gesamt',list.length,'')
    +kpi('✅','Aktiv',aktiv,'')
    +kpi('📅','Geplant',geplant,'')
    +kpi('✓','Abgeschlossen',abgeschl,'')
    +'</div>';

  var filterHtml = '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">'
    +'<input id="f-q" oninput="render()" value="'+esc(qQ)+'" placeholder="🔍 Mieter, Bereich..." style="'+inputStyle+'max-width:220px;">'
    +'<select id="f-st" onchange="render()" style="'+inputStyle+'max-width:160px;"><option value="">Alle Status</option><option value="Aktiv">Aktiv</option><option value="Geplant">Geplant</option><option value="Abgeschlossen">Abgeschlossen</option></select>'
    +'</div>';

  var tableHtml = '';
  if (!filtered.length) {
    tableHtml = emptyState('🧹','Keine Reinigungseinträge','Füge den ersten Eintrag für den Reinigungsplan hinzu','+ Eintrag hinzufügen','openAdd()');
  } else {
    tableHtml = '<div style="background:white;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;">'
      +'<table style="width:100%;border-collapse:collapse;">'
      +'<thead><tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0;">'
      +'<th style="text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">Mieter / Wohnung</th>'
      +'<th style="text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">Bereich</th>'
      +'<th style="text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">Von</th>'
      +'<th style="text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">Bis</th>'
      +'<th style="text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">Status</th>'
      +'<th style="text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;">Notiz</th>'
      +'<th style="padding:12px 16px;"></th>'
      +'</tr></thead>'
      +'<tbody>';
    filtered.forEach(function(r, idx) {
      var bg = idx%2===0?'white':'#fafbfc';
      var isAktiv = r._status === 'Aktiv';
      tableHtml += '<tr style="background:'+bg+';border-bottom:1px solid #f1f5f9;">'
        +'<td style="padding:12px 16px;font-size:13px;font-weight:600;color:#0f172a;">'+esc(r.mieter||'–')+(r.wohnung?'<br><span style="font-size:11px;color:#94a3b8;font-weight:400;">'+esc(r.wohnung)+'</span>':'')+'</td>'
        +'<td style="padding:12px 16px;font-size:13px;color:#475569;">'+esc(r.bereich||'–')+'</td>'
        +'<td style="padding:12px 16px;font-size:13px;color:#475569;">'+fmtDate(r.von)+'</td>'
        +'<td style="padding:12px 16px;font-size:13px;color:#475569;">'+fmtDate(r.bis)+'</td>'
        +'<td style="padding:12px 16px;">'+statusBadge(r._status)+'</td>'
        +'<td style="padding:12px 16px;font-size:12px;color:#64748b;max-width:200px;">'+esc(r.notiz||'–')+'</td>'
        +'<td style="padding:12px 16px;">'
        +'<div style="display:flex;gap:4px;">'
        +'<button onclick="openEdit(\''+r.id+'\')" style="width:30px;height:30px;border-radius:7px;border:none;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:12px;">✏️</button>'
        +'<button onclick="deleteRei(\''+r.id+'\')" style="width:30px;height:30px;border-radius:7px;border:none;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:12px;">🗑️</button>'
        +'</div>'
        +'</td>'
        +'</tr>';
    });
    tableHtml += '</tbody></table></div>';
  }

  var actionBtn = '<button onclick="openAdd()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Eintrag hinzufügen</button>';
  var main = '<div style="padding:24px;">'+getTrialBanner()+kpiHtml+filterHtml+tableHtml+'</div>';
  renderLayout('reinigung','Reinigung & Hausordnung', actionBtn, main, buildModal(mieter));
}

function kpi(ico,l,v,s) {
  return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">'
    +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div>'
    +'<div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'
    +(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')
    +'</div>';
}

function buildModal(mieter) {
  var mOpts = '<option value="">– Manuell eingeben –</option>'
    +(mieter||[]).map(function(m){ return '<option value="'+esc(m.name||'')+'|'+esc(m.wn||'')+'">'+esc(m.name||'')+(m.wn?' – '+esc(m.wn):'')+'</option>'; }).join('');

  return '<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:480px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="m-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Eintrag hinzufügen</h3>'
    +'<div style="margin-bottom:12px;">'+lbl('Mieter (aus Liste)')+'<select id="r-mopt" onchange="fillMieter()" style="'+inputStyle+'">'+mOpts+'</select></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;">'+lbl('Mieter Name')+'<input id="r-mieter" style="'+inputStyle+'" placeholder="Max Mustermann"></div>'
    +'<div style="margin-bottom:12px;">'+lbl('Wohnung')+'<input id="r-wohnung" style="'+inputStyle+'" placeholder="EG Links"></div>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'+lbl('Bereich')+'<select id="r-bereich" style="'+inputStyle+'">'
    +BEREICHE.map(function(b){ return '<option>'+b+'</option>'; }).join('')
    +'</select></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;">'+lbl('Von')+'<input id="r-von" type="date" style="'+inputStyle+'"></div>'
    +'<div style="margin-bottom:12px;">'+lbl('Bis')+'<input id="r-bis" type="date" style="'+inputStyle+'"></div>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'+lbl('Notiz (optional)')+'<textarea id="r-notiz" style="'+inputStyle+'height:70px;resize:vertical;" placeholder="z.B. Jeden Montag + Donnerstag"></textarea></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeAdd()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveRei()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function fillMieter() {
  var val = (document.getElementById('r-mopt')||{}).value||'';
  if (!val) return;
  var parts = val.split('|');
  document.getElementById('r-mieter').value = parts[0]||'';
  document.getElementById('r-wohnung').value = parts[1]||'';
}

function openAdd() {
  editId = null;
  document.getElementById('m-title').textContent = 'Eintrag hinzufügen';
  ['r-mieter','r-wohnung','r-notiz'].forEach(function(x){ document.getElementById(x).value=''; });
  document.getElementById('r-von').value = today();
  document.getElementById('r-bis').value = '';
  document.getElementById('r-bereich').value = BEREICHE[0];
  document.getElementById('add-modal').style.display = 'flex';
}

function openEdit(id) {
  var r = getData(KEYS.reinigungen, []).find(function(x){ return x.id===id; }); if (!r) return;
  editId = id;
  document.getElementById('m-title').textContent = 'Eintrag bearbeiten';
  document.getElementById('r-mieter').value = r.mieter||'';
  document.getElementById('r-wohnung').value = r.wohnung||'';
  document.getElementById('r-bereich').value = r.bereich||BEREICHE[0];
  document.getElementById('r-von').value = r.von||'';
  document.getElementById('r-bis').value = r.bis||'';
  document.getElementById('r-notiz').value = r.notiz||'';
  document.getElementById('add-modal').style.display = 'flex';
}

function closeAdd() { document.getElementById('add-modal').style.display='none'; }

function saveRei() {
  var mieter = document.getElementById('r-mieter').value.trim();
  if (!mieter) { alert('Bitte Mieter eingeben.'); return; }
  var list = getData(KEYS.reinigungen, []);
  var obj = { id: editId||gid(), mieter: mieter, wohnung: document.getElementById('r-wohnung').value.trim(),
    bereich: document.getElementById('r-bereich').value, von: document.getElementById('r-von').value,
    bis: document.getElementById('r-bis').value, notiz: document.getElementById('r-notiz').value.trim() };
  if (editId) { var idx=list.findIndex(function(x){return x.id===editId;}); if(idx>=0) list[idx]=obj; }
  else list.push(obj);
  setData(KEYS.reinigungen, list); syncToFirebase(uid); closeAdd(); render();
}

function deleteRei(id) {
  if (!confirm('Eintrag löschen?')) return;
  setData(KEYS.reinigungen, getData(KEYS.reinigungen,[]).filter(function(x){return x.id!==id;}));
  syncToFirebase(uid); render();
}

initFirebase();
loadFromFirebase(uid, function(){ render(); });
</script>
</body>
</html>
