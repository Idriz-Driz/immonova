<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – Projekte</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body>
<script>
checkAuth(); checkTrial();
var user = getUser(); var uid = user.uid;
var appData = {}; var editId = null; var activeTab = 'liste';
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;outline:none;box-sizing:border-box;';
var STATUS_COLS = {Planung:'#64748b',Aktiv:'#2563eb',Pausiert:'#d97706',Abgeschlossen:'#16a34a',Abgebrochen:'#dc2626'};
var PRIO_COLS = {Hoch:'#dc2626',Normal:'#d97706',Niedrig:'#64748b'};
function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl() { return 'display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;'; }
function fg(label,id,type,ph) { return '<div style="margin-bottom:12px;"><label style="'+lbl()+'">'+label+'</label><input id="'+id+'" type="'+type+'" placeholder="'+ph+'" style="'+inputStyle+'"></div>'; }
function fmtDate(d) { if(!d) return '–'; var x=new Date(d); return isNaN(x)?d:x.toLocaleDateString('de-DE'); }
function fmtEur(n) { return (Number(n)||0).toLocaleString('de-DE')+' €'; }
function daysDiff(a,b) { return Math.round((new Date(b)-new Date(a))/86400000); }
function progressBar(pct,col) { return '<div style="background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;"><div style="height:100%;width:'+Math.min(100,Math.max(0,pct))+'%;background:'+col+';border-radius:99px;transition:width 0.3s;"></div></div>'; }

function render() {
  var proj = appData.projekte || [];
  var aktiv = proj.filter(function(p){ return p.status==='Aktiv'; }).length;
  var sumBudget = proj.reduce(function(s,p){ return s+(Number(p.budget)||0); },0);
  var abgeschl = proj.filter(function(p){ return p.status==='Abgeschlossen'; }).length;

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;">'
    +kpi('📁','Gesamt Projekte',proj.length,'')
    +kpi('🔵','Aktiv',aktiv,'Laufende Projekte')
    +kpi('✅','Abgeschlossen',abgeschl,'')
    +kpi('💰','Gesamtbudget',fmtEur(sumBudget),'')
    +'</div>';

  var tabsHtml = '<div style="display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:20px;gap:3px;">'
    +['liste','gantt','aufgaben'].map(function(t,i){
      var ls=['📋 Projektliste','📊 Zeitplan (Gantt)','✅ Aufgaben'];
      return '<button onclick="switchTab(\''+t+'\')" style="flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'+(activeTab===t?'background:white;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,0.1);':'background:none;color:#94a3b8;')+'">'+ls[i]+'</button>';
    }).join('')+'</div>';

  var content = '';

  if (activeTab === 'liste') {
    if (!proj.length) {
      content = emptyState('📁','Keine Projekte','Erstelle dein erstes Projekt','+ Projekt erstellen','openAdd()');
    } else {
      content = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;">';
      proj.forEach(function(p) {
        var col = STATUS_COLS[p.status]||'#64748b';
        var pcol = PRIO_COLS[p.prioritaet]||'#64748b';
        var pct = p.fortschritt || 0;
        var barCol = pct>=80?'#16a34a':pct>=50?'#d97706':'#2563eb';
        var dauer = (p.start&&p.ende) ? daysDiff(p.start,p.ende)+' Tage' : '–';
        content += '<div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-top:4px solid '+col+';">'
          +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">'
          +'<div><div style="font-size:16px;font-weight:800;color:#0f172a;">'+esc(p.name||'–')+'</div>'
          +'<div style="font-size:12px;color:#64748b;margin-top:2px;">📍 '+esc(p.objekt||'–')+'</div></div>'
          +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'
          +'<span style="background:'+col+'20;color:'+col+';font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;">'+esc(p.status||'Planung')+'</span>'
          +'<span style="background:'+pcol+'20;color:'+pcol+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;">'+esc(p.prioritaet||'Normal')+'</span>'
          +'</div></div>'
          +'<div style="margin-bottom:12px;">'
          +'<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:12px;color:#64748b;">Fortschritt</span><span style="font-size:12px;font-weight:700;color:'+barCol+';">'+pct+'%</span></div>'
          +progressBar(pct, barCol)
          +'</div>'
          +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">'
          +'<div style="background:#f8fafc;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#94a3b8;">Budget</div><div style="font-size:13px;font-weight:700;color:#0f172a;">'+fmtEur(p.budget)+'</div></div>'
          +'<div style="background:#f8fafc;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#94a3b8;">Dauer</div><div style="font-size:13px;font-weight:700;color:#0f172a;">'+dauer+'</div></div>'
          +'</div>'
          +'<div style="font-size:12px;color:#64748b;margin-bottom:14px;">📅 '+fmtDate(p.start)+' – '+fmtDate(p.ende)+'<br>👤 '+esc(p.verantwortlich||'–')+'</div>'
          +(p.beschreibung?'<div style="font-size:12px;color:#94a3b8;margin-bottom:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(p.beschreibung)+'</div>':'')
          +'<div style="display:flex;gap:8px;">'
          +'<button onclick="openEdit(\''+p.id+'\')" style="flex:1;padding:8px;border-radius:8px;border:none;background:#eff6ff;color:#2563eb;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">✏️ Bearbeiten</button>'
          +'<button onclick="deleteP(\''+p.id+'\')" style="width:36px;border-radius:8px;border:none;background:#fef2f2;color:#dc2626;cursor:pointer;">🗑️</button>'
          +'</div></div>';
      });
      content += '</div>';
    }

  } else if (activeTab === 'gantt') {
    if (!proj.length) {
      content = emptyState('📊','Kein Zeitplan','Erstelle Projekte um den Gantt-Chart zu sehen','+ Projekt erstellen','openAdd()');
    } else {
      // Simple Gantt chart
      var allDates = proj.filter(function(p){ return p.start&&p.ende; });
      if (!allDates.length) { content = '<div style="text-align:center;padding:40px;color:#94a3b8;">Keine Projekte mit Start- und Enddatum vorhanden.</div>'; }
      else {
        var minDate = allDates.reduce(function(m,p){ return p.start<m?p.start:m; }, allDates[0].start);
        var maxDate = allDates.reduce(function(m,p){ return p.ende>m?p.ende:m; }, allDates[0].ende);
        var totalDays = daysDiff(minDate, maxDate) || 1;
        content = '<div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);overflow-x:auto;">'
          +'<div style="min-width:600px;">';
        allDates.forEach(function(p) {
          var col = STATUS_COLS[p.status]||'#64748b';
          var startOff = daysDiff(minDate,p.start);
          var dur = daysDiff(p.start,p.ende)||1;
          var leftPct = (startOff/totalDays)*100;
          var widthPct = (dur/totalDays)*100;
          content += '<div style="display:grid;grid-template-columns:180px 1fr;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;">'
            +'<div style="font-size:12px;font-weight:600;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(p.name)+'</div>'
            +'<div style="position:relative;height:28px;background:#f1f5f9;border-radius:6px;">'
            +'<div style="position:absolute;left:'+leftPct+'%;width:'+widthPct+'%;background:'+col+';border-radius:6px;height:100%;display:flex;align-items:center;padding:0 8px;">'
            +'<span style="font-size:10px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;">'+fmtDate(p.start)+' – '+fmtDate(p.ende)+'</span>'
            +'</div></div></div>';
        });
        content += '</div></div>';
      }
    }

  } else {
    // Aufgaben tab – project tasks
    var allTasks = [];
    proj.forEach(function(p){ (p.aufgaben||[]).forEach(function(a){ allTasks.push(Object.assign({projektName:p.name,projektId:p.id},a)); }); });
    if (!allTasks.length) {
      content = '<div style="text-align:center;padding:60px;color:#94a3b8;"><div style="font-size:48px;margin-bottom:12px;">✅</div><p style="font-size:15px;font-weight:600;">Keine Projektaufgaben</p><p style="font-size:13px;margin-top:4px;">Bearbeite ein Projekt um Aufgaben hinzuzufügen</p></div>';
    } else {
      content = '<div style="background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);">';
      allTasks.forEach(function(t) {
        var col = t.erledigt?'#16a34a':'#64748b';
        content += '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f1f5f9;">'
          +'<div onclick="toggleTask(\''+t.projektId+'\',\''+t.id+'\')" style="width:20px;height:20px;border-radius:5px;border:2px solid '+(t.erledigt?'#16a34a':'#e2e8f0')+';background:'+(t.erledigt?'#16a34a':'white')+';cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">'+(t.erledigt?'✓':'')+'</div>'
          +'<div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#0f172a;'+(t.erledigt?'text-decoration:line-through;opacity:0.5;':'')+'">'+esc(t.titel||'–')+'</div>'
          +'<div style="font-size:11px;color:#94a3b8;">📁 '+esc(t.projektName)+' · '+(t.faellig?fmtDate(t.faellig):'kein Datum')+'</div></div>'
          +'<span style="background:'+col+'20;color:'+col+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;">'+(t.erledigt?'Erledigt':'Offen')+'</span>'
          +'</div>';
      });
      content += '</div>';
    }
  }

  var actionBtn = '<button onclick="openAdd()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Projekt erstellen</button>';
  var main = '<div style="padding:24px;">'+getTrialBanner()+kpiHtml+tabsHtml+content+'</div>';
  document.body.innerHTML = renderLayout('projekte','Projekte',actionBtn,main,buildModal());
}

function kpi(ico,l,v,s) { return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);"><div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div><div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'+(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')+'</div>'; }
function switchTab(t) { activeTab=t; render(); }

function buildModal() {
  return '<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:560px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="m-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Projekt erstellen</h3>'
    +fg('Projektname','p-name','text','z.B. Dachrenovierung Musterstr. 1')
    +fg('Objekt / Gebäude','p-obj','text','Musterstr. 1')
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Beschreibung</label><textarea id="p-beschr" style="'+inputStyle+'height:80px;resize:vertical;" placeholder="Kurze Beschreibung des Projekts..."></textarea></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Status</label><select id="p-status" style="'+inputStyle+'">'+Object.keys(STATUS_COLS).map(function(s){ return '<option>'+s+'</option>'; }).join('')+'</select></div>'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Priorität</label><select id="p-prior" style="'+inputStyle+'"><option>Normal</option><option>Hoch</option><option>Niedrig</option></select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Startdatum','p-start','date','')
    +fg('Enddatum','p-ende','date','')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Budget (€)','p-budget','number','10000')
    +fg('Fortschritt (%)','p-fort','number','0')
    +'</div>'
    +fg('Verantwortlich','p-verantw','text','Name der Person')
    +fg('Auftragnehmer / Handwerker','p-hw','text','')
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeAdd()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveP()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function openAdd() { editId=null; document.getElementById('m-title').textContent='Projekt erstellen'; ['p-name','p-obj','p-beschr','p-start','p-ende','p-budget','p-verantw','p-hw'].forEach(function(x){document.getElementById(x).value='';}); document.getElementById('p-fort').value='0'; document.getElementById('add-modal').style.display='flex'; }
function openEdit(id) {
  var p=(appData.projekte||[]).find(function(x){return x.id===id;}); if(!p) return; editId=id;
  document.getElementById('m-title').textContent='Projekt bearbeiten';
  document.getElementById('p-name').value=p.name||''; document.getElementById('p-obj').value=p.objekt||''; document.getElementById('p-beschr').value=p.beschreibung||''; document.getElementById('p-status').value=p.status||'Planung'; document.getElementById('p-prior').value=p.prioritaet||'Normal'; document.getElementById('p-start').value=p.start||''; document.getElementById('p-ende').value=p.ende||''; document.getElementById('p-budget').value=p.budget||''; document.getElementById('p-fort').value=p.fortschritt||0; document.getElementById('p-verantw').value=p.verantwortlich||''; document.getElementById('p-hw').value=p.handwerker||'';
  document.getElementById('add-modal').style.display='flex';
}
function closeAdd() { document.getElementById('add-modal').style.display='none'; }
function saveP() {
  var name=document.getElementById('p-name').value.trim(); if(!name){alert('Projektname eingeben.');return;}
  var proj=appData.projekte||[];
  var existing = editId?(proj.find(function(x){return x.id===editId;})||{}):{};
  var obj={id:editId||gid(),name:name,objekt:document.getElementById('p-obj').value.trim(),beschreibung:document.getElementById('p-beschr').value.trim(),status:document.getElementById('p-status').value,prioritaet:document.getElementById('p-prior').value,start:document.getElementById('p-start').value,ende:document.getElementById('p-ende').value,budget:document.getElementById('p-budget').value,fortschritt:parseInt(document.getElementById('p-fort').value)||0,verantwortlich:document.getElementById('p-verantw').value.trim(),handwerker:document.getElementById('p-hw').value.trim(),aufgaben:existing.aufgaben||[]};
  if(editId){var idx=proj.findIndex(function(x){return x.id===editId;}); if(idx>=0) proj[idx]=obj;}else proj.unshift(obj);
  appData.projekte=proj; syncToFirebase(uid); closeAdd(); render();
}
function deleteP(id) { if(!confirm('Projekt löschen?')) return; appData.projekte=(appData.projekte||[]).filter(function(x){return x.id!==id;}); syncToFirebase(uid); render(); }
function toggleTask(projektId, taskId) {
  var p=(appData.projekte||[]).find(function(x){return x.id===projektId;}); if(!p||!p.aufgaben) return;
  var t=p.aufgaben.find(function(x){return x.id===taskId;}); if(!t) return;
  t.erledigt=!t.erledigt; syncToFirebase(uid); render();
}

initFirebase();
loadFromFirebase(uid, function(d) { if(d) appData=d; if(!appData.projekte) appData.projekte=[]; render(); });
</script>
</body>
</html>
