<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoNova – CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
</head>
<body>
<script>
checkAuth(); checkTrial();
var user = getUser(); var uid = user.uid;
var appData = {}; var editId = null; var activeTab = 'pipeline';
var inputStyle = 'width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#0f172a;outline:none;box-sizing:border-box;';
var STAGES = ['Lead','Kontaktiert','Qualifiziert','Angebot','Abschluss'];
var STAGE_COLS = {Lead:'#64748b',Kontaktiert:'#2563eb',Qualifiziert:'#d97706',Angebot:'#7c3aed',Abschluss:'#16a34a'};
var PRIOR_COLS = {Hoch:'#dc2626',Normal:'#d97706',Niedrig:'#64748b'};
function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lbl() { return 'display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:5px;text-transform:uppercase;'; }
function fg(label,id,type,ph) { return '<div style="margin-bottom:12px;"><label style="'+lbl()+'">'+label+'</label><input id="'+id+'" type="'+type+'" placeholder="'+ph+'" style="'+inputStyle+'"></div>'; }
function fmtDate(d) { if(!d) return '–'; var x=new Date(d); return isNaN(x)?d:x.toLocaleDateString('de-DE'); }
function isOverdue(d) { return d && new Date(d) < new Date(); }

function render() {
  var fu = appData.followups || [];
  var today = new Date().toISOString().slice(0,10);
  var overdue = fu.filter(function(f){ return f.faellig && f.faellig < today && f.status !== 'Erledigt'; });
  var todayItems = fu.filter(function(f){ return f.faellig === today && f.status !== 'Erledigt'; });

  var kpiHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;">'
    +kpi('📋','Gesamt Follow-Ups',fu.length,'')
    +kpi('⚠️','Überfällig',overdue.length,'Sofort bearbeiten')
    +kpi('📅','Heute fällig',todayItems.length,'')
    +kpi('✅','Erledigt',fu.filter(function(f){return f.status==='Erledigt';}).length,'')
    +'</div>';

  var tabsHtml = '<div style="display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:20px;gap:3px;">'
    +'<button onclick="switchTab(\'pipeline\')" style="flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'+(activeTab==='pipeline'?'background:white;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,0.1);':'background:none;color:#94a3b8;')+'">🏢 Pipeline (Kanban)</button>'
    +'<button onclick="switchTab(\'followups\')" style="flex:1;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;'+(activeTab==='followups'?'background:white;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,0.1);':'background:none;color:#94a3b8;')+'">📋 Follow-Up Liste</button>'
    +'</div>';

  var content = '';
  if (activeTab === 'pipeline') {
    // Kanban board using interessenten with stages
    var ints = appData.interessenten || [];
    content = '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto;">';
    STAGES.forEach(function(stage) {
      var col = STAGE_COLS[stage];
      var items = ints.filter(function(i){ return (i.stage||'Lead') === stage; });
      content += '<div ondragover="event.preventDefault()" ondrop="dropCard(event,\''+stage+'\')" style="background:#f8fafc;border-radius:14px;padding:14px;min-height:300px;">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'
        +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div style="width:10px;height:10px;border-radius:50%;background:'+col+';"></div>'
        +'<span style="font-size:12px;font-weight:700;color:#475569;">'+stage+'</span></div>'
        +'<span style="background:'+col+'20;color:'+col+';font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;">'+items.length+'</span></div>';
      items.forEach(function(item) {
        var name = (item.vn||'')+' '+(item.nn||'');
        content += '<div draggable="true" ondragstart="dragCard(event,\''+item.id+'\')" '
          +'style="background:white;border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,0.08);">'
          +'<div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:4px;">'+esc(name)+'</div>'
          +(item.objekt?'<div style="font-size:11px;color:#64748b;margin-bottom:4px;">📍 '+esc(item.objekt)+'</div>':'')
          +(item.budget?'<div style="font-size:11px;color:#2563eb;font-weight:600;">💰 '+item.budget+' €</div>':'')
          +'<div style="display:flex;gap:4px;margin-top:8px;">'
          +(item.tel?'<a href="https://wa.me/'+item.tel.replace(/\D/g,'')+'" target="_blank" style="font-size:12px;text-decoration:none;">💬</a>':'')
          +'<button onclick="openEditInt(\''+item.id+'\')" style="font-size:11px;border:none;background:none;cursor:pointer;color:#2563eb;padding:0;">✏️</button>'
          +'</div></div>';
      });
      content += '</div>';
    });
    content += '</div>';

  } else {
    // Follow-Up list
    if (overdue.length) {
      content += '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">'
        +'<span style="font-size:22px;">⚠️</span>'
        +'<strong style="color:#dc2626;">'+overdue.length+' überfällige Follow-Up'+(overdue.length>1?'s'!'')+' – sofort bearbeiten!</strong></div>';
    }
    var sorted = fu.slice().sort(function(a,b){ return (a.faellig||'').localeCompare(b.faellig||''); });
    if (!sorted.length) {
      content += emptyState('📋','Keine Follow-Ups','Plane deinen nächsten Kontakt','+ Follow-Up erstellen','openAdd()');
    } else {
      content += '<div style="background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);">';
      sorted.forEach(function(f) {
        var overd = isOverdue(f.faellig) && f.status !== 'Erledigt';
        var pcol = PRIOR_COLS[f.prioritaet]||'#64748b';
        var scol = f.status==='Erledigt'?'#16a34a':overd?'#dc2626':'#d97706';
        content += '<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f1f5f9;background:'+(overd?'#fff5f5':'white')+';">'
          +'<div style="width:10px;height:10px;border-radius:50%;background:'+pcol+';flex-shrink:0;"></div>'
          +'<div style="flex:1;min-width:0;">'
          +'<div style="font-size:14px;font-weight:600;color:#0f172a;">'+esc(f.titel||'–')+'</div>'
          +'<div style="font-size:12px;color:#64748b;">'+esc(f.kontakt||'–')+' · '+esc(f.typ||'')+'</div></div>'
          +'<div style="text-align:right;flex-shrink:0;">'
          +'<div style="font-size:12px;font-weight:600;color:'+(overd?'#dc2626':'#475569')+';">'+fmtDate(f.faellig)+'</div>'
          +'<span style="background:'+scol+'20;color:'+scol+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;">'+esc(f.status||'Offen')+'</span>'
          +'</div>'
          +'<div style="display:flex;gap:6px;flex-shrink:0;">'
          +'<button onclick="toggleFU(\''+f.id+'\')" style="padding:6px 10px;border-radius:8px;border:none;background:'+(f.status==='Erledigt'?'#f1f5f9':'#f0fdf4')+';color:'+(f.status==='Erledigt'?'#94a3b8':'#16a34a')+';font-size:11px;font-weight:700;cursor:pointer;">'+(f.status==='Erledigt'?'↩ Öffnen':'✓ Erledigt')+'</button>'
          +'<button onclick="editFU(\''+f.id+'\')" style="width:30px;height:30px;border-radius:8px;border:none;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:12px;">✏️</button>'
          +'<button onclick="deleteFU(\''+f.id+'\')" style="width:30px;height:30px;border-radius:8px;border:none;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:12px;">🗑️</button>'
          +'</div></div>';
      });
      content += '</div>';
    }
  }

  var actionBtn = activeTab==='pipeline'
    ? '<button onclick="openEditInt(\'\')" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Interessent</button>'
    : '<button onclick="openAdd()" style="padding:9px 18px;background:#2563eb;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Follow-Up</button>';

  var main = '<div style="padding:24px;">'+getTrialBanner()+kpiHtml+tabsHtml+content+'</div>';
  document.body.innerHTML = renderLayout('crm','CRM & Follow-Up',actionBtn,main,buildFUModal()+buildIntModal());
}

function kpi(ico,l,v,s) { return '<div style="background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);"><div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">'+l+'</div><div style="font-size:24px;font-weight:800;color:#0f172a;">'+v+'</div>'+(s?'<div style="font-size:12px;color:#64748b;margin-top:2px;">'+s+'</div>':'')+'</div>'; }
function switchTab(t) { activeTab=t; render(); }

var draggedId = '';
function dragCard(e,id) { draggedId=id; e.dataTransfer.effectAllowed='move'; }
function dropCard(e,stage) {
  e.preventDefault();
  var item=(appData.interessenten||[]).find(function(x){return x.id===draggedId;});
  if(item){ item.stage=stage; syncToFirebase(uid); render(); }
}

function buildFUModal() {
  return '<div id="fu-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:480px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="fu-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Follow-Up erstellen</h3>'
    +fg('Titel','fu-titel','text','z.B. Rückruf vereinbaren')
    +fg('Kontakt / Person','fu-kontakt','text','Name des Kontakts')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Typ</label><select id="fu-typ" style="'+inputStyle+'"><option>Anruf</option><option>Email</option><option>Besichtigung</option><option>Meeting</option><option>Sonstiges</option></select></div>'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Priorität</label><select id="fu-prior" style="'+inputStyle+'"><option>Normal</option><option>Hoch</option><option>Niedrig</option></select></div>'
    +'</div>'
    +fg('Fällig am','fu-faellig','date','')
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Status</label><select id="fu-status" style="'+inputStyle+'"><option>Offen</option><option>Erledigt</option><option>Verschoben</option></select></div>'
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Notizen</label><textarea id="fu-notizen" style="'+inputStyle+'height:80px;resize:vertical;"></textarea></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeFU()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveFU()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function buildIntModal() {
  return '<div id="int-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">'
    +'<div style="background:white;border-radius:20px;padding:28px;max-width:480px;width:100%;margin:20px;max-height:90vh;overflow-y:auto;">'
    +'<h3 id="int-title" style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:20px;">Interessent</h3>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Vorname','int-vn','text','Max')+fg('Nachname','int-nn','text','Mustermann')
    +'</div>'
    +fg('Email','int-em','email','') +fg('Telefon','int-tel','tel','')
    +fg('Gewünschtes Objekt','int-obj','text','')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
    +fg('Budget (€/Mo)','int-budget','number','')
    +'<div style="margin-bottom:12px;"><label style="'+lbl()+'">Pipeline-Stage</label><select id="int-stage" style="'+inputStyle+'">'+STAGES.map(function(s){ return '<option>'+s+'</option>'; }).join('')+'</select></div>'
    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:18px;">'
    +'<button onclick="closeIntModal()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Abbrechen</button>'
    +'<button onclick="saveIntModal()" style="flex:1;padding:11px;border-radius:9px;border:none;background:#2563eb;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern</button>'
    +'</div></div></div>';
}

function openAdd() { editId=null; document.getElementById('fu-title').textContent='Follow-Up erstellen'; ['fu-titel','fu-kontakt','fu-notizen'].forEach(function(x){document.getElementById(x).value='';}); document.getElementById('fu-faellig').value=new Date().toISOString().slice(0,10); document.getElementById('fu-modal').style.display='flex'; }
function editFU(id) {
  var f=(appData.followups||[]).find(function(x){return x.id===id;}); if(!f) return; editId=id;
  document.getElementById('fu-title').textContent='Follow-Up bearbeiten';
  document.getElementById('fu-titel').value=f.titel||''; document.getElementById('fu-kontakt').value=f.kontakt||''; document.getElementById('fu-typ').value=f.typ||'Anruf'; document.getElementById('fu-prior').value=f.prioritaet||'Normal'; document.getElementById('fu-faellig').value=f.faellig||''; document.getElementById('fu-status').value=f.status||'Offen'; document.getElementById('fu-notizen').value=f.notizen||'';
  document.getElementById('fu-modal').style.display='flex';
}
function closeFU() { document.getElementById('fu-modal').style.display='none'; }
function saveFU() {
  var titel=document.getElementById('fu-titel').value.trim(); if(!titel){alert('Titel eingeben.');return;}
  var fu=appData.followups||[];
  var obj={id:editId||gid(),titel:titel,kontakt:document.getElementById('fu-kontakt').value.trim(),typ:document.getElementById('fu-typ').value,prioritaet:document.getElementById('fu-prior').value,faellig:document.getElementById('fu-faellig').value,status:document.getElementById('fu-status').value,notizen:document.getElementById('fu-notizen').value.trim()};
  if(editId){var idx=fu.findIndex(function(x){return x.id===editId;}); if(idx>=0) fu[idx]=obj;}else fu.unshift(obj);
  appData.followups=fu; syncToFirebase(uid); closeFU(); render();
}
function toggleFU(id) { var f=(appData.followups||[]).find(function(x){return x.id===id;}); if(!f) return; f.status=f.status==='Erledigt'?'Offen':'Erledigt'; syncToFirebase(uid); render(); }
function deleteFU(id) { if(!confirm('Follow-Up löschen?')) return; appData.followups=(appData.followups||[]).filter(function(x){return x.id!==id;}); syncToFirebase(uid); render(); }

function openEditInt(id) {
  editId=id||null;
  var item=id?(appData.interessenten||[]).find(function(x){return x.id===id;}):null;
  document.getElementById('int-title').textContent=item?'Interessent bearbeiten':'Interessent hinzufügen';
  ['int-vn','int-nn','int-em','int-tel','int-obj','int-budget'].forEach(function(x){document.getElementById(x).value=item?item[x.replace('int-','')]||'':'';});
  if(item) document.getElementById('int-stage').value=item.stage||'Lead';
  document.getElementById('int-modal').style.display='flex';
}
function closeIntModal() { document.getElementById('int-modal').style.display='none'; }
function saveIntModal() {
  var vn=document.getElementById('int-vn').value.trim(),nn=document.getElementById('int-nn').value.trim();
  if(!vn&&!nn){alert('Namen eingeben.');return;}
  var ints=appData.interessenten||[];
  var obj={id:editId||gid(),vn:vn,nn:nn,email:document.getElementById('int-em').value.trim(),tel:document.getElementById('int-tel').value.trim(),objekt:document.getElementById('int-obj').value.trim(),budget:document.getElementById('int-budget').value,stage:document.getElementById('int-stage').value,status:'Neu'};
  if(editId){var idx=ints.findIndex(function(x){return x.id===editId;}); if(idx>=0) ints[idx]=obj;}else ints.unshift(obj);
  appData.interessenten=ints; syncToFirebase(uid); closeIntModal(); render();
}

initFirebase();
loadFromFirebase(uid, function(d) { if(d) appData=d; if(!appData.followups) appData.followups=[]; if(!appData.interessenten) appData.interessenten=[]; render(); });
</script>
</body>
</html>
